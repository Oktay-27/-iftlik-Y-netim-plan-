<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çiftlik Test</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js" crossorigin></script>
</head>
<body style="background: #F7F3EE; font-family: sans-serif; padding: 20px;">
    <div id="root">Sistem yükleniyor, lütfen bekleyin...</div>

    <script type="text/babel">
        function App() {
            return (
                <div style={{background: '#fff', padding: 20, borderRadius: 10, boxShadow: '0 2px 5px rgba(0,0,0,0.1)'}}>
                    <h2>🐑 Çiftlik Yönetimi Test Sayfası</h2>
                    <p>Eğer bu yazıyı görüyorsan, React ve tarayıcın sorunsuz çalışıyor demektir!</p>
                    <button onClick={() => alert('Sistem Çalışıyor!')} style={{padding: '10px 20px', background: '#5C7A4E', color: '#fff', border: 'none', borderRadius: 5, cursor: 'pointer'}}>
                        Tıkla ve Test Et
                    </button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
