<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js" crossorigin></script>
    <style>body{margin:0;padding:0;background:#F7F3EE;} div::-webkit-scrollbar{height:4px;} div::-webkit-scrollbar-thumb{background:#E2D9CD;border-radius:10px;}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const APP_ADI = "Çiftlik Yönetimi", bugun = new Date().toISOString().split("T")[0];
        
        const STORAGE_KEYS = { 
            hayvanlar: "koyun_hayvanlar", 
            islemler: "koyun_islemler", 
            rasyonlar: "koyun_rasyonlar", 
            saglik: "koyun_saglik", 
            dogumlar: "koyun_dogumlar", 
            dollenme: "koyun_dollenme", 
            agirliK: "koyun_agirlik" 
        };
        
        const loadData = (k) => { try{ const r = localStorage.getItem(k); return r ? JSON.parse(r) : []; }catch(e){ return []; } };
        const saveData = (k, d) => { try{ localStorage.setItem(k, JSON.stringify(d)); }catch(e){ console.error(e); } };
        const kalanGun = (t) => { if(!t) return null; const d1 = new Date(t).setHours(0,0,0,0); const d2 = new Date().setHours(0,0,0,0); return Math.ceil((d1 - d2)/(1000*60*60*24)); };

        const R = { zemin:"#F7F3EE", kart:"#FFFFFF", birincil:"#5C7A4E", vurgu:"#C87137", metin:"#2C2416", metinAcik:"#7A6B55", sinir:"#E2D9CD", tehlike:"#C0392B", uyari:"#E67E22" };
        const S = {
          app:{minHeight:"100vh",background:R.zemin,fontFamily:"'Georgia',serif",color:R.metin},
          header:{background:R.birincil,color:"#fff",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.1)"},
          nav:{background:"#fff",borderBottom:`1px solid ${R.sinir}`,display:"flex",overflowX:"auto",padding:"0 16px"},
          navBtn:(a)=>({padding:"14px",border:"none",background:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:a?"700":"400",color:a?R.birincil:R.metinAcik,borderBottom:a?`3px solid ${R.birincil}`:"3px solid transparent",whiteSpace:"nowrap"}),
          card:{background:R.kart,borderRadius:10,border:`1px solid ${R.sinir}`,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"},
          input:{width:"100%",padding:"9px 12px",border:`1px solid ${R.sinir}`,borderRadius:7,fontFamily:"inherit",fontSize:14,background:R.zemin,color:R.metin,boxSizing:"border-box",marginBottom:12},
          btnP:{background:R.birincil,color:"#fff",border:"none",borderRadius:7,padding:"9px 18px",cursor:"pointer",fontWeight:"600",fontFamily:"inherit"},
          btnS:{background:R.sinir,color:R.metin,border:"none",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:"inherit"},
          btnD:{background:"none",border:"none",fontSize:12,cursor:"pointer",padding:"5px 10px"},
          table:{width:"100%",borderCollapse:"collapse",fontSize:14},
          th:{textAlign:"left",padding:"10px 12px",background:R.zemin,borderBottom:`2px solid ${R.sinir}`,fontSize:12,color:R.metinAcik,textTransform:"uppercase"},
          td:{padding:"10px 12px",borderBottom:`1px solid ${R.sinir}`,verticalAlign:"middle"},
          badge:(c)=>({display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:"600",background:c+"22",color:c}),
          modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16},
          modalBox:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"},
          sayac:(c)=>({background:c,borderRadius:12,padding:"16px 20px",textAlign:"center",color:"#fff",minWidth:80}),
          sayacRakam:{fontSize:42,fontWeight:"900",color:"#fff",lineHeight:1},
          sayacEtiket:{fontSize:11,color:"rgba(255,255,255,0.85)",marginTop:4,textTransform:"uppercase",letterSpacing:0.5}
        };

        function F({label, children}){return <div style={{marginBottom:12}}><label style={{display:"block",fontSize:12,fontWeight:"600",color:R.metinAcik,marginBottom:4,textTransform:"uppercase"}}>{label}</label>{children}</div>;}
        
        function Modal({title, onClose, onSave, children}){
          return (
            <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
              <div style={S.modalBox}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><h3>{title}</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer"}}>×</button></div>
                {children}
                <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}><button onClick={onClose} style={S.btnS}>İptal</button><button onClick={onSave} style={S.btnP}>Kaydet</button></div>
              </div>
            </div>
          );
        }

        function GunSayaci({tarih, etiket}){
          const gun = kalanGun(tarih); if(gun===null) return null;
          const c = gun<0 ? R.tehlike : gun style={S.sayac(c)}>
              <div style={S.sayacRakam}>{gun<0 ? Math.abs(gun) : gun}</div>
              <div style={S.sayacEtiket}>{gun<0 ? "GÜN GEÇTİ" : "GÜN KALDI"}</div>
              <div style={{fontSize:9,opacity:0.8,marginTop:2}}>{etiket}</div>
            </div>
          );
        }

        function KalanBadge({tarih}){
          const gun = kalanGun(tarih); if(gun===null) return <span>-</span>;
          const c = gun<0 ? R.tehlike : gun<=7 ? R.tehlike : gun<=30 ? R.uyari : R.birincil;
          return <span style={S.badge(c)}>{gun<0 ? `${Math.abs(gun)} gün geçti` : gun===0 ? "Bugün!" : gun===1 ? "Yarın" : `${gun} gün`}</span>;
        }

        // ─── ÖZET SEKMESİ ──────────────────────────────────────────────────────────
        function Ozet({hayvanlar, islemler, dollenme, saglik}){
          const g = islemler.filter(i=>i.tip==="Gelir").reduce((t,i)=>t+Number(i.tutar||0),0);
          const gi = islemler.filter(i=>i.tip==="Gider").reduce((t,i)=>t+Number(i.tutar||0),0);
          const bAy = bugun.slice(0,7);
          const bG = islemler.filter(i=>i.tip==="Gelir"&&i.tarih?.startsWith(bAy)).reduce((t,i)=>t+Number(i.tutar||0),0);
          const bGi = islemler.filter(i=>i.tip==="Gider"&&i.tarih?.startsWith(bAy)).reduce((t,i)=>t+Number(i.tutar||0),0);
          const yDogum = dollenme.filter(d=>d.tahminiDogum&&kalanGun(d.tahminiDogum)>=0&&kalanGun(d.tahminiDogum)<=30);

          return (
            <div>
              <div style={{...S.card, background:`linear-gradient(135deg,${R.birincil},#3d5c32)`, color:"#fff", textAlign:"center"}}>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10}}>
                  <div><h2>{hayvanlar.length}</h2><span style={{fontSize:12,opacity:0.8}}>Sürü Mevcudu</span></div>
                  <div><h2>{g.toLocaleString("tr-TR")} ₺</h2><span style={{fontSize:12,opacity:0.8}}>Toplam Gelir</span></div>
                  <div><h2>{gi.toLocaleString("tr-TR")} ₺</h2><span style={{fontSize:12,opacity:0.8}}>Toplam Gider</span></div>
                </div>
              </div>
              {yDogum.length>0 && (
                <div style={S.card}>
                  <h3>🐣 Yaklaşan Doğumlar</h3>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yDogum.map((d,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:200}}>
                        <GunSayaci tarih={d.tahminiDogum} etiket="DOĞUMA KALAN" />
                        <div style={{fontWeight:"700",fontSize:16}}>{d.kupeNo}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div style={S.card}><div style={{fontSize:13,fontWeight:"700",color:R.metinAcik,marginBottom:12,textTransform:"uppercase"}}>Bu Ay</div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span>Gelir:</span><strong>{bG.toLocaleString("tr-TR")} ₺</strong></div><div style={{display:"flex",justifyContent:"space-between"}}><span>Gider:</span><strong>{bGi.toLocaleString("tr-TR")} ₺</strong></div></div>
                <div style={S.card}><div style={{fontSize:13,fontWeight:"700",color:R.metinAcik,marginBottom:12,textTransform:"uppercase"}}>Sürü Bilgisi</div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span>🐑 Dişi:</span><strong>{hayvanlar.filter(h=>h.cinsiyet==="Dişi").length}</strong></div><div style={{display:"flex",justifyContent:"space-between"}}><span>🐏 Erkek:</span><strong>{hayvanlar.filter(h=>h.cinsiyet==="Erkek").length}</strong></div></div>
              </div>
            </div>
          );
        }

        // ─── HAYVAN KAYITLARI SEKMESİ (DÜZENLEME VE TÜM ALANLAR DAHİL) ─────────────────
        function HayvanKayitlari({hayvanlar, setHayvanlar}){
          const [modal, setModal] = useState(false);
          const [duzenle, setDuzenle] = useState(null);
          const [arama, setArama] = useState("");
          const [form, setForm] = useState({kupeNo:"", isim:"", cins:"", yas:"", cinsiyet:"Dişi", agirlik:"", notlar:""});

          const kaydet = () => {
            if(!form.kupeNo) return alert("Küpe No zorunludur.");
            let yeni;
            if(duzenle !== null){
              yeni = hayvanlar.map((h, i) => i === duzenle ? {...form} : h);
            } else {
              yeni = [...hayvanlar, {...form, id: Date.now()}];
            }
            setHayvanlar(yeni);
            saveData(STORAGE_KEYS.hayvanlar, yeni);
            setModal(false);
            setDuzenle(null);
            setForm({kupeNo:"", isim:"", cins:"", yas:"", cinsiyet:"Dişi", agirlik:"", notlar:""});
          };

          const sil = (idx) => {
            if(!confirm("Silmek istiyor musunuz?")) return;
            const yeni = hayvanlar.filter((_, i) => i !== idx);
            setHayvanlar(yeni);
            saveData(STORAGE_KEYS.hayvanlar, yeni);
          };

          const filtreli = hayvanlar.filter(h => h.kupeNo?.includes(arama) || h.isim?.toLowerCase().includes(arama.toLowerCase()));

          return (
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h2>🐑 Sürü Takibi</h2><button onClick={()=>{setDuzenle(null); setForm({kupeNo:"", isim:"", cins:"", yas:"", cinsiyet:"Dişi", agirlik:"", notlar:""}); setModal(true);}} style={S.btnP}>+ Hayvan Ekle</button></div>
              <input style={S.input} placeholder="Ara..." value={arama} onChange={e=>setArama(e.target.value)} />
              <table style={S.table}>
                <thead><tr><th style={S.th}>Küpe No</th><th style={S.th}>İsim</th><th style={S.th}>Cins</th><th style={S.th}>Cinsiyet</th><th style={S.th}>Ağırlık</th><th style={S.th}>İşlem</th></tr></thead>
                <tbody>{filtreli.map((h, i)=>(
                  <tr key={i}>
                    <td style={S.td}><strong>{h.kupeNo}</strong></td><td style={S.td}>{h.isim||"-"}</td><td style={S.td}>{h.cins||"-"}</td>
                    <td style={S.td}><span style={S.badge(h.cinsiyet==="Dişi"?R.birincil:R.vurgu)}>{h.cinsiyet}</span></td>
                    <td style={S.td}>{h.agirlik ? `${h.agirlik} kg` : "-"}</td>
                    <td style={S.td}>
                      <button style={S.btnD} onClick={()=>{setDuzenle(hayvanlar.indexOf(h)); setForm(h); setModal(true);}}>✏️</button>
                      <button style={S.btnD} onClick={()=>sil(hayvanlar.indexOf(h))}>🗑️</button>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
              {modal && (
                <Modal title={duzenle!==null?"Hayvanı Düzenle":"Yeni Hayvan Ekle"} onClose={()=>setModal(false)} onSave={kaydet}>
                  <F label="Küpe No *"><input style={S.input} value={form.kupeNo} onChange={e=>setForm({...form, kupeNo:e.target.value})}/></F>
                  <F label="İsim"><input style={S.input} value={form.isim} onChange={e=>setForm({...form, isim:e.target.value})}/></F>
                  <F label="Cins"><input style={S.input} placeholder="Merinos..." value={form.cins} onChange={e=>setForm({...form, cins:e.target.value})}/></F>
                  <F label="Yaş"><input type="number" style={S.input} value={form.yas} onChange={e=>setForm({...form, yas:e.target.value})}/></F>
                  <F label="Cinsiyet"><select style={S.input} value={form.cinsiyet} onChange={e=>setForm({...form, cinsiyet:e.target.value})}><option>Dişi</option><option>Erkek</option></select></F>
                  <F label="Ağırlık (kg)"><input type="number" style={S.input} value={form.agirlik} onChange={e=>setForm({...form, agirlik:e.target.value})}/></F>
                  <F label="Notlar"><textarea style={S.input} value={form.notlar} onChange={e=>setForm({...form, notlar:e.target.value})}/></F>
                </Modal>
              )}
            </div>
          );
        }

        // ─── MODÜLER JENERİK BİLEŞEN (DİĞER SEKMELER İÇİN) ───────────────────────────
        function JenerikTakip({baslik, alanlar, veriler, setVeriler, depoKey, modalAlanlar, varsayilanForm}){
          const [m,setM]=useState(false); const [f,setF]=useState(varsayilanForm);
          const kaydet=()=>{ const n=[...veriler,{...f,id:Date.now()}]; setVeriler(n); saveData(depoKey,n); setM(false); setF(varsayilanForm); };
          return (
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><h2>{baslik}</h2><button onClick={()=>setM(true)} style={S.btnP}>+ Ekle</button></div>
              <table style={S.table}>
                <thead><tr>{alanlar.map((a,i)=><th key={i} style={S.th}>{a.t}</th>)}</tr></thead>
                <tbody>{veriler.map((v,i)=><tr key={i}>{alanlar.map((a,j)=><td key={j} style={S.td}>{a.r(v)}</td>)}</tr>)}</tbody>
              </table>
              {m && <Modal title={baslik} onClose={()=>setM(false)} onSave={kaydet}>
                {modalAlanlar.map((ma,i)=><F key={i} label={ma.l}>
                  {ma.type==="select" ? <select style={S.input} onChange={e=>setF({...f,[ma.k]:e.target.value})}>{ma.opts.map((o,x)=><option key={x}>{o}</option>)}</select>
                  : ma.type==="textarea" ? <textarea style={S.input} onChange={e=>setF({...f,[ma.k]:e.target.value})}/>
                  : <input type={ma.type||"text"} value={f[ma.k]} style={S.input} onChange={e=>setF({...f,[ma.k]:e.target.value})}/>}
                </F>)}
              </Modal>}
            </div>
          );
        }

        // ─── ANA UYGULAMA BİLEŞENİ ──────────────────────────────────────────────────
        function App() {
          const [tab, setTab] = useState("ozet");
          const [hayvanlar, setHayvanlar] = useState([]); const [islemler, setIslemler] = useState([]);
          const [rasyonlar, setRasyonlar] = useState([]); const [saglik, setSaglik] = useState([]);
          const [dogumlar, setDogumlar] = useState([]);   const [dollenme, setDollenme] = useState([]);

          useEffect(() => {
            setHayvanlar(loadData(STORAGE_KEYS.hayvanlar)); setIslemler(loadData(STORAGE_KEYS.islemler));
            setRasyonlar(loadData(STORAGE_KEYS.rasyonlar)); setSaglik(loadData(STORAGE_KEYS.saglik));
            setDogumlar(loadData(STORAGE_KEYS.dogumlar));   setDollenme(loadData(STORAGE_KEYS.dollenme));
          }, []);

          return (
            <div style={S.app}>
              <div style={S.header}><h2>🚜 {APP_ADI}</h2></div>
              <div style={S.nav}>
                {["ozet:📊 Özet","hayvanlar:🐑 Sürü","finans:💰 Finans","saglik:💉 Sağlık","dollenme:🐏 Döllenme","dogumlar:🐣 Doğumlar","rasyonlar:🌾 Rasyon"].map(t=>{
                  const [k,v]=t.split(":"); return <button key={k} style={S.navBtn(tab===k)} onClick={()=>setTab(k)}>{v}</button>
                })}
              </div>
              <div style={{padding:"20px 16px",maxWidth:800,margin:"0 auto"}}>
                {tab === "ozet" && <Ozet hayvanlar={hayvanlar} islemler={islemler} dollenme={dollenme} saglik={saglik} />}
                {tab === "hayvanlar" && <HayvanKayitlari hayvanlar={hayvanlar} setHayvanlar={setHayvanlar} />}
                {tab === "finans" && <JenerikTakip baslik="💰 Finans Takibi" veriler={islemler} setVeriler={setIslemler} depoKey={STORAGE_KEYS.islemler} varsayilanForm={{tarih:bugun,tip:"Gider",kategori:"Yem",tutar:""}} alanlar={[{t:"Tarih",r:v=>v.tarih},{t:"Tip",r:v=><span style={S.badge(v.tip==="Gelir"?R.birincil:R.vurgu)}>{v.tip}</span>},{t:"Kategori",r:v=>v.kategori},{t:"Tutar",r:v=><strong>{v.tutar} ₺</strong>}]} modalAlanlar={[{l:"Tarih",k:"tarih",type:"date"},{l:"Tip",k:"tip",type:"select",opts:["Gider","Gelir"]},{l:"Kategori",k:"kategori"},{l:"Tutar (₺)",k:"tutar",type:"number"}]} />}
                {tab === "saglik" && <JenerikTakip baslik="💉 Sağlık & Aşı" veriler={saglik} setVeriler={setSaglik} depoKey={STORAGE_KEYS.saglik} varsayilanForm={{kupeNo:"",tip:"Aşı",ilac:"",tekrarTarihi:""}} alanlar={[{t:"Küpe No",r:v=>v.kupeNo},{t:"Tip",r:v=>v.tip},{t:"İlaç/Uygulama",r:v=>v.ilac},{t:"Tekrar",r:v=><KalanBadge tarih={v.tekrarTarihi}/>}]} modalAlanlar={[{l:"Küpe No",k:"kupeNo"},{l:"Tip",k:"tip",type:"select",opts:["Aşı","Tedavi","Parazit"]},{l:"İlaç",k:"ilac"},{l:"Tekrar Tarihi",k:"tekrarTarihi",type:"date"}]} />}
                {tab === "dollenme" && <JenerikTakip baslik="🐏 Döllenme Kayıtları" veriler={dollenme} setVeriler={setDollenme} depoKey={STORAGE_KEYS.dollenme} varsayilanForm={{kupeNo:"",dollenmeTarihi:bugun,tahminiDogum:""}} alanlar={[{t:"Ana Küpe",r:v=>v.kupeNo},{t:"Katım Tarihi",r:v=>v.dollenmeTarihi},{t:"Tahmini Doğum",r:v=>v.tahminiDogum},{t:"Kalan",r:v=><KalanBadge tarih={v.tahminiDogum}/>}]} modalAlanlar={[{l:"Ana Küpe No",k:"kupeNo"},{l:"Katım Tarihi",k:"dollenmeTarihi",type:"date"},{l:"Tahmini Doğum Tarihi",k:"tahminiDogum",type:"date"}]} />}
                {tab === "dogumlar" && <JenerikTakip baslik="🐣 Doğum Kayıtları" veriler={dogumlar} setVeriler={setDogumlar} depoKey={STORAGE_KEYS.dogumlar} varsayilanForm={{anaKupeNo:"",tarih:bugun,yavrular:"1"}} alanlar={[{t:"Ana Küpe",r:v=>v.anaKupeNo},{t:"Tarih",r:v=>v.tarih},{t:"Yavru Sayısı",r:v=>`${v.yavrular} Baş`}]} modalAlanlar={[{l:"Ana Küpe No",k:"anaKupeNo"},{l:"Doğum Tarihi",k:"tarih",type:"date"},{l:"Yavru Sayısı",k:"yavrular",type:"number"}]} />}
                {tab === "rasyonlar" && <JenerikTakip baslik="🌾 Rasyon Reçeteleri" veriler={rasyonlar} setVeriler={setRasyonlar} depoKey={STORAGE_KEYS.rasyonlar} varsayilanForm={{isim:"",hayvanGrubu:"",icerik:""}} alanlar={[{t:"Rasyon Adı",r:v=>v.isim},{t:"Grup",r:v=>v.hayvanGrubu},{t:"İçerik",r:v=>v.icerik}]} modalAlanlar={[{l:"Rasyon Adı",k:"isim"},{l:"Hayvan Grubu",k:"hayvanGrubu"},{l:"İçerik Oranları",k:"icerik",type:"textarea"}]} />}
              </div>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
    </html>
