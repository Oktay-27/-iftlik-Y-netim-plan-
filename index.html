<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js" crossorigin></script>
</head>
<body style="margin:0; padding:0; background:#F7F3EE; color:#2C2416; font-family:'Georgia',serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const bugun = () => new Date().toISOString().split("T")[0];
        const kalanGun = (t) => { if (!t) return null; return Math.ceil((new Date(t).setHours(0,0,0,0) - new Date().setHours(0,0,0,0))/(1000*60*60*24)); };

        const R = { zemin:"#F7F3EE", kart:"#FFFFFF", birincil:"#5C7A4E", vurgu:"#C87137", metinAcik:"#7A6B55", sinir:"#E2D9CD", tehlike:"#C0392B", uyari:"#E67E22" };
        const S = {
            card: { background:R.kart, borderRadius:10, border:`1px solid ${R.sinir}`, padding:20, marginBottom:16 },
            input: { width:"100%", padding:"9px 12px", border:`1px solid ${R.sinir}`, borderRadius:7, background:R.zemin, boxSizing:"border-box", marginBottom:12 },
            btnP: { background:R.birincil, color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", cursor:"pointer", fontWeight:"600" },
            btnS: { background:R.sinir, color:"#2C2416", border:"none", borderRadius:7, padding:"7px 14px", cursor:"pointer" },
            table: { width:"100%", borderCollapse:"collapse", fontSize:14 },
            th: { textAlign:"left", padding:"10px 12px", background:R.zemin, borderBottom:`2px solid ${R.sinir}`, fontSize:12, color:R.metinAcik, textTransform:"uppercase" },
            td: { padding:"10px 12px", borderBottom:`1px solid ${R.sinir}` },
            modal: { position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"center", justifyCenter:"center", zIndex:1000, padding:16 }
        };

        function App() {
            const [tab, setTab] = useState("ozet");
            const [hayvanlar, setHayvanlar] = useState(() => JSON.parse(localStorage.getItem("koyun_hayvanlar")) || []);
            const [agirlikGecmisi, setAgirlikGecmisi] = useState(() => JSON.parse(localStorage.getItem("koyun_agirlik")) || []);
            const [dollenme] = useState(() => JSON.parse(localStorage.getItem("koyun_dollenme")) || []);
            const [saglik] = useState(() => JSON.parse(localStorage.getItem("koyun_saglik")) || []);
            
            const [modal, setModal] = useState(false);
            const [modalAg, setModalAg] = useState(false);
            const [secili, setSecili] = useState(null);
            const [arama, setArama] = useState("");
            
            const [form, setForm] = useState({ kupeNo:"", isim:"", cins:"", yas:"", cinsiyet:"Dişi", agirlik:"", notlar:"" });
            const [formAg, setFormAg] = useState({ tarih:bugun(), agirlik:"" });

            const hKaydet = () => {
                if(!form.kupeNo) return alert("Küpe No şarttır.");
                const yeni = [...hayvanlar, { ...form, id:Date.now() }];
                setHayvanlar(yeni); localStorage.setItem("koyun_hayvanlar", JSON.stringify(yeni));
                setModal(false); setForm({ kupeNo:"", isim:"", cins:"", yas:"", cinsiyet:"Dişi", agirlik:"", notlar:"" });
            };

            const hSil = (id) => {
                if(!confirm("Silinsin mi?")) return;
                const yeni = hayvanlar.filter(h => h.id !== id);
                setHayvanlar(yeni); localStorage.setItem("koyun_hayvanlar", JSON.stringify(yeni));
            };

            const agKaydet = () => {
                if(!formAg.agirlik) return alert("Ağırlık girin.");
                const yeni = [...agirlikGecmisi, { ...formAg, kupeNo:secili.kupeNo, id:Date.now() }];
                setAgirlikGecmisi(yeni); localStorage.setItem("koyun_agirlik", JSON.stringify(yeni));
                setModalAg(false); setFormAg({ tarih:bugun(), agirlik:"" });
            };

            return (
                <div style={{minHeight:"100vh", background:R.zemin}}>
                    <div style={{background:R.birincil, color:"#fff", padding:"16px 24px", display:"flex", alignItems:"center", gap:12}}>
                        <span style={{fontSize:24}}>🚜</span><h1 style={{margin:0, fontSize:20}}>Çiftlik Yönetimi</h1>
                    </div>

                    <div style={{background:"#fff", borderBottom:`1px solid ${R.sinir}`, display:"flex"}}>
                        <button style={{padding:14, border:"none", background:"none", cursor:"pointer", fontWeight:tab==="ozet"?"700":"400", color:tab==="ozet"?R.birincil:R.metinAcik, borderBottom:tab==="ozet"?`3px solid ${R.birincil}`:"3px solid transparent"}} onClick={()=>setTab("ozet")}>📊 Özet</button>
                        <button style={{padding:14, border:"none", background:"none", cursor:"pointer", fontWeight:tab==="hayvanlar"?"700":"400", color:tab==="hayvanlar"?R.birincil:R.metinAcik, borderBottom:tab==="hayvanlar"?`3px solid ${R.birincil}`:"3px solid transparent"}} onClick={()=>setTab("hayvanlar")}>🐑 Hayvanlar</button>
                    </div>

                    <div style={{padding:"20px 16px", maxWidth:900, margin:"0 auto"}}>
                        {tab === "ozet" && (
                            <div>
                                <div style={{...S.card, background:`linear-gradient(135deg,${R.birincil} 0%,#3d5c32 100%)`, color:"#fff", textAlign:"center"}}>
                                    <div style={{fontSize:28, fontWeight:"700"}}>{hayvanlar.length}</div>
                                    <div style={{fontSize:12, opacity:0.8}}>Toplam Hayvan Sayısı</div>
                                </div>
                                <div style={S.card}>
                                    <h3 style={{margin:"0 0 12px 0"}}>Sürü Dağılımı</h3>
                                    <div style={{display:"flex", justifyBetween:"space-between", marginBottom:6}}><span>🐑 Dişi</span><strong>{hayvanlar.filter(h=>h.cinsiyet==="Dişi").length} baş</strong></div>
                                    <div style={{display:"flex", justifyBetween:"space-between"}}><span>🐏 Erkek</span><strong>{hayvanlar.filter(h=>h.cinsiyet==="Erkek").length} baş</strong></div>
                                </div>
                            </div>
                        )}

                        {tab === "hayvanlar" && (
                            <div style={S.card}>
                                <div style={{display:"flex", justifyBetween:"space-between", alignItems:"center", marginBottom:16}}>
                                    <h2 style={{margin:0, fontSize:18}}>Sürü Listesi</h2>
                                    <button style={S.btnP} onClick={()=>setModal(true)}>+ Ekle</button>
                                </div>
                                <input style={S.input} placeholder="Küpe no veya isim ara..." value={arama} onChange={e=>setArama(e.target.value)}/>
                                <div style={{overflowX:"auto"}}>
                                    <table style={S.table}>
                                        <thead><tr><th style={S.th}>Küpe No</th><th style={S.th}>İsim</th><th style={S.th}>Cinsiyet</th><th style={S.th}>Ağırlık</th><th style={S.th}>Aksiyon</th></tr></thead>
                                        <tbody>
                                            {hayvanlar.filter(h=>h.kupeNo.includes(arama)||h.isim.toLowerCase().includes(arama.toLowerCase())).map((h,i)=>{
                                                const sonAg = agirlikGecmisi.filter(a=>a.kupeNo===h.kupeNo).sort((a,b)=>b.tarih.localeCompare(a.tarih))[0];
                                                return (
                                                    <tr key={i}>
                                                        <td style={S.td}><strong>{h.kupeNo}</strong></td>
                                                        <td style={S.td}>{h.isim||"-"}</td>
                                                        <td style={S.td}>{h.cinsiyet}</td>
                                                        <td style={S.td}>{sonAg?`${sonAg.agirlik} kg`:h.agirlik?`${h.agirlik} kg`:"-"}</td>
                                                        <td style={S.td}>
                                                            <button style={{...S.btnS, padding:"4px 8px", fontSize:12, marginRight:4}} onClick={()=>{setSecili(h); setModalAg(true);}}>⚖️</button>
                                                            <button style={{background:R.tehlike, color:"#fff", border:"none", borderRadius:5, padding:"4px 8px", fontSize:12}} onClick={()=>hSil(h.id)}>🗑</button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {modal && (
                        <div style={S.modal}>
                            <div style={{background:"#fff", padding:24, borderRadius:12, width:"100%", maxWidth:450}}>
                                <h3 style={{marginTop:0}}>Yeni Hayvan Kaydı</h3>
                                <label style={{fontSize:12, color:R.metinAcik}}>KÜPE NO *</label>
                                <input style={S.input} value={form.kupeNo} onChange={e=>setForm({...form,kupeNo:e.target.value})}/>
                                <label style={{fontSize:12, color:R.metinAcik}}>İSİM</label>
                                <input style={S.input} value={form.isim} onChange={e=>setForm({...form,isim:e.target.value})}/>
                                <label style={{fontSize:12, color:R.metinAcik}}>CİNSİYET</label>
                                <select style={S.input} value={form.cinsiyet} onChange={e=>setForm({...form,cinsiyet:e.target.value})}><option>Dişi</option><option>Erkek</option></select>
                                <label style={{fontSize:12, color:R.metinAcik}}>BAŞLANGIÇ AĞIRLIĞI (KG)</label>
                                <input style={S.input} type="number" value={form.agirlik} onChange={e=>setForm({...form,agirlik:e.target.value})}/>
                                <div style={{display:"flex", gap:10, justifyEnd:"flex-end", marginTop:12}}>
                                    <button style={S.btnS} onClick={()=>setModal(false)}>İptal</button>
                                    <button style={S.btnP} onClick={hKaydet}>Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modalAg && secili && (
                        <div style={S.modal}>
                            <div style={{background:"#fff", padding:24, borderRadius:12, width:"100%", maxWidth:400}}>
                                <h3 style={{marginTop:0}}>{secili.kupeNo} - Tartım Girişi</h3>
                                <label style={{fontSize:12, color:R.metinAcik}}>TARTIM TARİHİ</label>
                                <input style={S.input} type="date" value={formAg.tarih} onChange={e=>setFormAg({...formAg,tarih:e.target.value})}/>
                                <label style={{fontSize:12, color:R.metinAcik}}>YENİ AĞIRLIK (KG) *</label>
                                <input style={S.input} type="number" value={formAg.agirlik} onChange={e=>setFormAg({...formAg,agirlik:e.target.value})}/>
                                <div style={{display:"flex", gap:10, justifyEnd:"flex-end", marginTop:12}}>
                                    <button style={S.btnS} onClick={()=>setModalAg(false)}>İptal</button>
                                    <button style={S.btnP} onClick={agKaydet}>Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
