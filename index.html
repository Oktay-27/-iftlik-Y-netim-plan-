<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js" crossorigin></script>
    <style>
        body { margin: 0; padding: 0; background-color: #F7F3EE; }
        div::-webkit-scrollbar { height: 4px; }
        div::-webkit-scrollbar-thumb { background: #E2D9CD; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const APP_ADI = "Çiftlik Yönetimi";

        const STORAGE_KEYS = {
          hayvanlar: "koyun_hayvanlar",
          islemler: "koyun_islemler",
          rasyonlar: "koyun_rasyonlar",
          saglik: "koyun_saglik",
          dogumlar: "koyun_dogumlar",
          dollenme: "koyun_dollenme",
          agirlikGecmisi: "koyun_agirlik",
        };

        const loadData = (key) => {
          try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch { return []; }
        };
        const saveData = (key, data) => {
          try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { console.error(e); }
        };

        const bugun = new Date().toISOString().split("T")[0];
        const tahminiDogumHesapla = (d) => { if (!d) return ""; const dt = new Date(d); dt.setDate(dt.getDate()+150); return dt.toISOString().split("T")[0]; };
        const kalanGun = (t) => { if (!t) return null; return Math.ceil((new Date(t).setHours(0,0,0,0) - new Date().setHours(0,0,0,0))/(1000*60*60*24)); };

        const R = {
          zemin:"#F7F3EE", kart:"#FFFFFF", birincil:"#5C7A4E", ikincil:"#8FAF7E",
          vurgu:"#C87137", metin:"#2C2416", metinAcik:"#7A6B55", sinir:"#E2D9CD",
          tehlike:"#C0392B", uyari:"#E67E22",
        };

        const S = {
          app:{minHeight:"100vh",background:R.zemin,fontFamily:"'Georgia',serif",color:R.metin},
          header:{background:R.birincil,color:"#fff",padding:"16px 24px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"},
          nav:{background:"#fff",borderBottom:`1px solid ${R.sinir}`,display:"flex",overflowX:"auto",padding:"0 16px"},
          navBtn:(a)=>({padding:"12px 14px",border:"none",background:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:a?"700":"400",color:a?R.birincil:R.metinAcik,borderBottom:a?`3px solid ${R.birincil}`:"3px solid transparent",whiteSpace:"nowrap"}),
          content:{padding:"20px 16px",maxWidth:900,margin:"0 auto"},
          card:{background:R.kart,borderRadius:10,border:`1px solid ${R.sinir}`,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"},
          row:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16},
          h2:{margin:0,fontSize:18},
          btnP:{background:R.birincil,color:"#fff",border:"none",borderRadius:7,padding:"9px 18px",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:"600"},
          btnS:{background:R.sinir,color:R.metin,border:"none",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13},
          btnD:{background:R.tehlike,color:"#fff",border:"none",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13},
          input:{width:"100%",padding:"9px 12px",border:`1px solid ${R.sinir}`,borderRadius:7,fontFamily:"inherit",fontSize:14,background:R.zemin,color:R.metin,boxSizing:"border-box"},
          label:{display:"block",fontSize:12,fontWeight:"600",color:R.metinAcik,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5},
          g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
          g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12},
          table:{width:"100%",borderCollapse:"collapse",fontSize:14},
          th:{textAlign:"left",padding:"10px 12px",background:R.zemin,borderBottom:`2px solid ${R.sinir}`,fontSize:12,fontWeight:"700",color:R.metinAcik,textTransform:"uppercase",letterSpacing:0.4},
          td:{padding:"10px 12px",borderBottom:`1px solid ${R.sinir}`,verticalAlign:"middle"},
          badge:(c)=>({display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:"600",background:c+"22",color:c}),
          modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16},
          modalBox:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"},
          sayac:(c)=>({background:c,borderRadius:12,padding:"16px 20px",textAlign:"center",minWidth:80}),
          sayacRakam:{fontSize:42,fontWeight:"900",color:"#fff",lineHeight:1},
          sayacEtiket:{fontSize:11,color:"rgba(255,255,255,0.85)",marginTop:4,textTransform:"uppercase",letterSpacing:0.5},
        };

        function F({label,children}){return <div style={{marginBottom:12}}><label style={S.label}>{label}</label>{children}</div>;}

        function Modal({title,onClose,onSave,children}){
          return(
            <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
              <div style={S.modalBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0}}>{title}</h3>
                  <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:R.metinAcik}}>×</button>
                </div>
                {children}
                <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
                  <button onClick={onClose} style={S.btnS}>İptal</button>
                  <button onClick={onSave} style={S.btnP}>Kaydet</button>
                </div>
              </div>
            </div>
          );
        }

        function GunSayaci({tarih,etiket}){
          const gun=kalanGun(tarih);
          if(gun===null) return null;
          const c=gun<0?R.tehlike:gun<=7?R.tehlike:gun<=30?R.uyari:R.birincil;
          const txt=gun<0?`${Math.abs(gun)} GÜN GEÇTİ`:gun===0?"BUGÜN!":gun===1?"YARIN":"";
          return(
            <div style={S.sayac(c)}>
              {gun>1?<div style={S.sayacRakam}>{gun}</div>:<div style={{...S.sayacRakam,fontSize:26}}>{txt}</div>}
              {gun>1&&<div style={{fontSize:13,color:"rgba(255,255,255,0.9)",fontWeight:"700"}}>GÜN</div>}
              <div style={S.sayacEtiket}>{etiket}</div>
            </div>
          );
        }

        function KalanBadge({tarih}){
          const gun=kalanGun(tarih);
          if(gun===null) return <span style={{color:R.metinAcik}}>-</span>;
          const c=gun<0?R.tehlike:gun<=7?R.tehlike:gun<=30?R.uyari:R.birincil;
          const txt=gun<0?`${Math.abs(gun)} gün geçti`:gun===0?"Bugün!":gun===1?"Yarın":`${gun} gün kaldı`;
          return <span style={S.badge(c)}>{txt}</span>;
        }

        function exportExcel(hayvanlar,islemler,saglik,dogumlar,dollenme){
          const rows=[];
          rows.push(["=== HAYVAN KAYITLARI ==="]);
          rows.push(["Küpe No","İsim","Cins","Yaş","Cinsiyet","Ağırlık"]);
          hayvanlar.forEach(h=>rows.push([h.kupeNo,h.isim,h.cins,h.yas,h.cinsiyet,h.agirlik]));
          rows.push([]);
          rows.push(["=== GELİR/GİDER ==="]);
          rows.push(["Tarih","Tip","Kategori","Tutar","Açıklama"]);
          islemler.forEach(i=>rows.push([i.tarih,i.tip,i.kategori,i.tutar,i.aciklama]));
          const csv=rows.map(r=>r.map(c=>`"${c??""}"`).join(",")).join("\n");
          const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a"); a.href=url; a.download="ciftlik.csv"; a.click();
        }

        // ─── ÖZET COMPONENT ──────────────────────────────────────────────────────────
        function Ozet({hayvanlar,islemler,dogumlar,dollenme,rasyonlar,saglik}){
          const gelir=islemler.filter(i=>i.tip==="Gelir").reduce((t,i)=>t+Number(i.tutar||0),0);
          const gider=islemler.filter(i=>i.tip==="Gider").reduce((t,i)=>t+Number(i.tutar||0),0);
          const buAy=new Date().toISOString().slice(0,7);
          const buAyG=islemler.filter(i=>i.tip==="Gelir"&&i.tarih?.startsWith(buAy)).reduce((t,i)=>t+Number(i.tutar||0),0);
          const buAyGi=islemler.filter(i=>i.tip==="Gider"&&i.tarih?.startsWith(buAy)).reduce((t,i)=>t+Number(i.tutar||0),0);

          const aylar=[];
          for(let i=5;i>=0;i--){
            const d=new Date(); d.setMonth(d.getMonth()-i);
            const key=d.toISOString().slice(0,7);
            const ad=d.toLocaleString("tr-TR",{month:"short"});
            const g=islemler.filter(x=>x.tip==="Gelir"&&x.tarih?.startsWith(key)).reduce((t,x)=>t+Number(x.tutar||0),0);
            const gi=islemler.filter(x=>x.tip==="Gider"&&x.tarih?.startsWith(key)).reduce((t,x)=>t+Number(x.tutar||0),0);
            aylar.push({ad,g,gi});
          }
          const maxVal=Math.max(...aylar.map(a=>Math.max(a.g,a.gi)),1);

          const yakDogum=dollenme.filter(d=>d.tahminiDogum).map(d=>({...d,kalan:kalanGun(d.tahminiDogum)})).filter(d=>d.kalan!==null&&d.kalan>=0&&d.kalan<=30).sort((a,b)=>a.kalan-b.kalan);
          const yakRasyon=rasyonlar.filter(r=>r.sonrakiDegisim).map(r=>({...r,kalan:kalanGun(r.sonrakiDegisim)})).filter(r=>r.kalan!==null&&r.kalan>=0&&r.kalan<=14).sort((a,b)=>a.kalan-b.kalan);
          const yakAsi=saglik.filter(s=>s.tekrarTarihi).map(s=>({...s,kalan:kalanGun(s.tekrarTarihi)})).filter(s=>s.kalan!==null&&s.kalan>=0&&s.kalan<=14).sort((a,b)=>a.kalan-b.kalan);

          return(
            <div>
              <div style={{...S.card,background:`linear-gradient(135deg,${R.birincil} 0%,#3d5c32 100%)`,color:"#fff"}}>
                <div style={{fontSize:15,fontWeight:"700",marginBottom:12,opacity:0.9}}>🌿 {APP_ADI}</div>
                <div style={S.g3}>
                  {[{s:hayvanlar.length,l:"Toplam Hayvan",c:"#fff"},{s:gelir.toLocaleString("tr-TR")+" ₺",l:"Toplam Gelir",c:"#A8D5A2"},{s:gider.toLocaleString("tr-TR")+" ₺",l:"Toplam Gider",c:"#FFAA80"}].map((x,i)=>(
                    <div key={i} style={{textAlign:"center",padding:12}}>
                      <div style={{fontSize:24,fontWeight:"700",color:x.c,margin:"4px 0"}}>{x.s}</div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.75)"}}>{x.l}</div>
                    </div>
                  ))}
                </div>
              </div>

              {yakDogum.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>🐣 Yaklaşan Doğumlar</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakDogum.map((d,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={d.tahminiDogum} etiket="DOĞUMA KALAN"/>
                        <div><div style={{fontWeight:"700",fontSize:15}}>{d.kupeNo}</div><div style={{fontSize:12,color:R.metinAcik}}>{d.tahminiDogum}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {yakAsi.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>💉 Yaklaşan Aşı Tekrarları</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakAsi.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={s.tekrarTarihi} etiket="TEKRARA KALAN"/>
                        <div><div style={{fontWeight:"700",fontSize:15}}>{s.kupeNo}</div><div style={{fontSize:13,color:R.metinAcik}}>{s.tip}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {yakRasyon.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>🌾 Rasyon Değişim Hatırlatması</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakRasyon.map((r,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={r.sonrakiDegisim} etiket="DEĞİŞİME KALAN"/>
                        <div><div style={{fontWeight:"700",fontSize:15}}>{r.isim}</div><div style={{fontSize:12,color:R.metinAcik}}>{r.hayvanGrubu}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={S.card}>
                <div style={{fontWeight:"700",marginBottom:16,fontSize:15}}>📊 Son 6 Ay Gelir/Gider</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:120}}>
                  {aylar.map((a,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:90}}>
                        <div style={{flex:1,background:R.birincil,borderRadius:"3px 3px 0 0",height:`${(a.g/maxVal)*90}px`,minHeight:a.g>0?3:0}}/>
                        <div style={{flex:1,background:R.vurgu,borderRadius:"3px 3px 0 0",height:`${(a.gi/maxVal)*90}px`,minHeight:a.gi>0?3:0}}/>
                      </div>
                      <div style={{fontSize:11,color:R.metinAcik}}>{a.ad}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={S.g2}>
                <div style={S.card}>
                  <div style={{fontSize:13,fontWeight:"700",color:R.metinAcik,marginBottom:12,textTransform:"uppercase"}}>Bu Ay</div>
                  {[["Gelir",buAyG,R.birincil],["Gider",buAyGi,R.vurgu]].map(([l,v,c])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{color:c}}>● {l}</span><strong>{v.toLocaleString("tr-TR")} ₺</strong>
                    </div>
                  ))}
                  <div style={{borderTop:`1px solid ${R.sinir}`,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
                    <strong>Net Kâr</strong>
                    <strong style={{color:(buAyG-buAyGi)>=0?R.birincil:R.tehlike}}>{(buAyG-buAyGi).toLocaleString("tr-TR")} ₺</strong>
                  </div>
                </div>
                <div style={S.card}>
                  <div style={{fontSize:13,fontWeight:"700",color:R.metinAcik,marginBottom:12,textTransform:"uppercase"}}>Sürü</div>
                  {[["🐑 Dişi",hayvanlar.filter(h=>h.cinsiyet==="Dişi").length],["🐏 Erkek",hayvanlar.filter(h=>h.cinsiyet==="Erkek").length],["🔴 Gebe",dollenme.filter(d=>d.tahminiDogum&&kalanGun(d.tahminiDogum)>=0).length],["🐣 Toplam Yavru",dogumlar.reduce((t,d)=>t+Number(d.yavrular||0),0)]].map(([l,v])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:13}}>{l}</span><strong>{v}</strong>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        // ─── HAYVAN KAYITLARI COMPONENT ──────────────────────────────────────────────
        function HayvanKayitlari({hayvanlar,setHayvanlar,agirlikGecmisi,setAgirlikGecmisi}){
          const bos={kupeNo:"",isim:"",cins:"",yas:"",cinsiyet:"Dişi",agirlik:"",notlar:""};
          const [modal,setModal]=useState(false);
          const [modalAg,setModalAg]=useState(false);
          const [secili,setSecili]=useState(null);
          const [form,setForm]=useState(bos);
          const [duzenle,setDuzenle]=useState(null);
          const [arama,setArama]=useState("");
          const [formAg,setFormAg]=useState({tarih:bugun,agirlik:""});

          const kaydet=()=>{
            if(!form.kupeNo)return alert("Küpe No zorunludur.");
            const yeni=duzenle!==null?hayvanlar.map((h,i)=>i===duzenle?form:h):[...hayvanlar,{...form,id:Date.now()}];
            setHayvanlar(yeni); saveData(STORAGE_KEYS.hayvanlar,yeni);
            setModal(false);setForm(bos);setDuzenle(null);
          };

          const sil=(i)=>{
            if(!confirm("Silmek istiyor musunuz?"))return;
            const yeni=hayvanlar.filter((_,idx)=>idx!==i);
            setHayvanlar(yeni); saveData(STORAGE_KEYS.hayvanlar,yeni);
          };

          const kaydetAg=()=>{
            if(!formAg.agirlik)return alert("Ağırlık giriniz.");
            const yeni=[...agirlikGecmisi,{...formAg,kupeNo:secili.kupeNo,id:Date.now()}];
            setAgirlikGecmisi(yeni); saveData(STORAGE_KEYS.agirlikGecmisi,yeni);
            setModalAg(false);setFormAg({tarih:bugun,agirlik:""});
          };

          const filtreli=hayvanlar.filter(h=>h.kupeNo?.includes(arama)||h.isim?.toLowerCase().includes(arama.toLowerCase())||h.cins?.toLowerCase().includes(arama.toLowerCase()));

          return(
            <div>
              <div style={S.card}>
                <div style={S.row}><h2 style={S.h2}>🐑 Hayvan Kayıtları</h2><button style={S.btnP} onClick={()=>{setForm(bos);setDuzenle(null);setModal(true);}}>+ Hayvan Ekle</button></div>
                <input style={{...S.input,marginBottom:16}} placeholder="Ara..." value={arama} onChange={e=>setArama(e.target.value)}/>
                {filtreli.length===0?<div style={{color:R.metinAcik,textAlign:"center",padding:32}}>Kayıt yok.</div>:(
                  <div style={{overflowX:"auto"}}>
                    <table style={S.table}>
                      <thead><tr>{["Küpe No","İsim","Cins","Yaş","Cinsiyet","Ağırlık",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                      <tbody>{filtreli.map((h,i)=>{
                        const ag=agirlikGecmisi.filter(a=>a.kupeNo===h.kupeNo).sort((a,b)=>b.tarih.localeCompare(a.tarih));
                        return(
                          <tr key={i}>
                            <td style={S.td}><strong>{h.kupeNo}</strong></td>
                            <td style={S.td}>{h.isim||"-"}</td>
                            <td style={S.td}>{h.cins||"-"}</td>
                            <td style={S.td}>{h.yas?`${h.yas} yaş`:"-"}</td>
                            <td style={S.td}><span style={S.badge(h.cinsiyet==="Dişi"?R.birincil:R.vurgu)}>{h.cinsiyet}</span></td>
                            <td style={S.td}>{ag[0]?`${ag[0].agirlik} kg`:h.agirlik?`${h.agirlik} kg`:"-"}</td>
                            <td style={S.td}><div style={{display:"flex",gap:4}}>
                              <button style={{...S.btnS,fontSize:12,padding:"5px 10px"}} onClick={()=>{setSecili(h);setModalAg(true);}}>⚖️</button>
                              <button style={{...S.btnS,fontSize:12,padding:"5px 10px"}} onClick={()=>{setForm(h);setDuzenle(hayvanlar.indexOf(h));setModal(true);}}>✏️</button>
                              <button style={{...S.btnD,fontSize:12,padding:"5px 10px"}} onClick={()=>sil(hayvanlar.indexOf(h))}>🗑</button>
                            </div></td>
                          </tr>
                        );
