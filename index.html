<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <style>
        body { margin: 0; padding: 0; background-color: #F7F3EE; font-family: 'Georgia', serif; color: #2C2416; }
        div::-webkit-scrollbar { height: 4px; }
        div::-webkit-scrollbar-thumb { background: #E2D9CD; border-radius: 10px; }
        .app { min-height: 100vh; background: #F7F3EE; color: #2C2416; }
        .header { background: #5C7A4E; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .nav { background: #fff; border-bottom: 1px solid #E2D9CD; display: flex; overflow-x: auto; padding: 0 16px; }
        .nav-btn { padding: 12px 14px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; color: #7A6B55; border-bottom: 3px solid transparent; white-space: nowrap; }
        .nav-btn.active { font-weight: 700; color: #5C7A4E; border-bottom: 3px solid #5C7A4E; }
        .content { padding: 20px 16px; max-width: 900px; margin: 0 auto; }
        .card { background: #FFFFFF; border-radius: 10px; border: 1px solid #E2D9CD; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .btn-p { background: #5C7A4E; color: #fff; border: none; border-radius: 7px; padding: 9px 18px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; }
        .btn-s { background: #E2D9CD; color: #2C2416; border: none; border-radius: 7px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 13px; }
        .btn-d { background: #C0392B; color: #fff; border: none; border-radius: 7px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 13px; }
        .input { width: 100%; padding: 9px 12px; border: 1px solid #E2D9CD; border-radius: 7px; font-family: inherit; font-size: 14px; background: #F7F3EE; color: #2C2416; box-sizing: border-box; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #7A6B55; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .th { text-align: left; padding: 10px 12px; background: #F7F3EE; border-bottom: 2px solid #E2D9CD; font-size: 12px; font-weight: 700; color: #7A6B55; text-transform: uppercase; letter-spacing: 0.4px; }
        .td { padding: 10px 12px; border-bottom: 1px solid #E2D9CD; vertical-align: middle; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .sayac { border-radius: 12px; padding: 16px 20px; text-align: center; min-width: 80px; }
        @media (max-width: 600px) { .g2, .g3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <span style="font-size:24px;">🚜</span>
            <h1 style="margin:0; font-size:20px; font-weight:700;">Çiftlik Yönetimi</h1>
            <button class="btn-s" style="margin-left:auto; background:rgba(255,255,255,0.2); color:#fff;" onclick="disariAktar()">📥 Dışarı Aktar</button>
        </div>

        <div class="nav">
            <button id="nav-ozet" class="nav-btn active" onclick="switchTab('ozet')">📊 Özet</button>
            <button id="nav-hayvanlar" class="nav-btn" onclick="switchTab('hayvanlar')">🐑 Hayvanlar</button>
            <button id="nav-finans" class="nav-btn" onclick="switchTab('finans')">💰 Muhasebe</button>
        </div>

        <div id="tab-content" class="content"></div>
    </div>

    <div id="app-modal" class="modal" style="display:none;" onclick="if(event.target===this) closeModal()">
        <div class="modal-box">
            <div style="display:flex; justify-content:between; align-items:center; margin-bottom:20px; justify-content: space-between;">
                <h3 id="modal-title" style="margin:0;"></h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:22px; cursor:pointer; color:#7A6B55;">×</button>
            </div>
            <div id="modal-body"></div>
            <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
                <button onclick="closeModal()" class="btn-s">İptal</button>
                <button id="modal-save-btn" class="btn-p">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // Veri ve Ayar Yapısı
        let activeTab = 'ozet';
        let hayvanlar = [];
        let islemler = [];
        let rasyonlar = [];
        let saglik = [];
        let dogumlar = [];
        let dollenme = [];
        let agirlikGecmisi = [];
        let aramaMetni = "";

        const R = { birincil:"#5C7A4E", vurgu:"#C87137", metinAcik:"#7A6B55", sinir:"#E2D9CD", tehlike:"#C0392B", uyari:"#E67E22", zemin:"#F7F3EE" };
        const bugun = new Date().toISOString().split("T")[0];
        
        const kalanGun = (t) => { if (!t) return null; return Math.ceil((new Date(t).setHours(0,0,0,0) - new Date().setHours(0,0,0,0))/(1000*60*60*24)); };
        const loadData = (key) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch { return []; } };
        const saveData = (key, data) => { try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { console.error(e); } };

        function init() {
            hayvanlar = loadData("koyun_hayvanlar");
            islemler = loadData("koyun_islemler");
            rasyonlar = loadData("koyun_rasyonlar");
            saglik = loadData("koyun_saglik");
            dogumlar = loadData("koyun_dogumlar");
            dollenme = loadData("koyun_dollenme");
            agirlikGecmisi = loadData("koyun_agirlik");
            render();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            render();
        }

        function render() {
            const el = document.getElementById('tab-content');
            el.innerHTML = '';
            if (activeTab === 'ozet') renderOzet(el);
            if (activeTab === 'hayvanlar') renderHayvanlar(el);
            if (activeTab === 'finans') renderFinans(el);
        }

        // Sayaç ve Rozet Bileşenleri (Saf JS)
        function getGunSayaciHTML(tarih, etiket) {
            const gun = kalanGun(tarih);
            if(gun===null) return '';
            const c = gun<0 ? R.tehlike : gun<=7 ? R.tehlike : gun<=30 ? R.uyari : R.birincil;
            const txt = gun<0 ? `${Math.abs(gun)} GÜN GEÇTİ` : gun===0 ? "BUGÜN!" : gun===1 ? "YARIN" : "";
            return `
                <div class="sayac" style="background:${c};">
                    ${gun>1 ? `<div style="font-size:42px; font-weight:900; color:#fff; line-height:1;">${gun}</div>` : `<div style="font-size:28px; font-weight:900; color:#fff; line-height:1;">${txt||gun}</div>`}
                    ${gun>1 ? `<div style="font-size:13px; color:rgba(255,255,255,0.9); font-weight:700;">GÜN</div>` : ''}
                    <div style="font-size:11px; color:rgba(255,255,255,0.85); marginTop:4px; text-transform:uppercase; letter-spacing:0.5px;">${etiket}</div>
                </div>
            `;
        }

        function getBadgeHTML(c, txt) { return `<span class="badge" style="background:${c}22; color:${c};">${txt}</span>`; }

            const gider = islemler.filter(i=>i.tip==="Gider").reduce((t,i)=>t+Number(i.tutar),0);
            const buAy = new Date().toISOString().slice(0,7);
            const buAyG = islemler.filter(i=>i.tip==="Gelir"&&i.tarih?.startsWith(buAy)).reduce((t,i)=>t+Number(i.tutar),0);
            const buAyGi = islemler.filter(i=>i.tip==="Gider"&&i.tarih?.startsWith(buAy)).reduce((t,i)=>t+Number(i.tutar),0);

                const d = new Date(); d.setMonth(d.getMonth()-i);
                const key = d.toISOString().slice(0,7);
                const ad = d.toLocaleString("tr-TR",{month:"short"});
                const g = islemler.filter(x=>x.tip==="Gelir"&&x.tarih?.startsWith(key)).reduce((t,x)=>t+Number(x.
