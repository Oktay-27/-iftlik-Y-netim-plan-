<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <style>
        body { margin: 0; padding: 0; background-color: #F7F3EE; fontFamily: "Georgia", serif; color: #2C2416; }
        div::-webkit-scrollbar { height: 4px; }
        div::-webkit-scrollbar-thumb { background: #E2D9CD; border-radius: 10px; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; font-family: 'Georgia', serif; }
        .header { background: #5C7A4E; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .nav { background: #fff; border-bottom: 1px solid #E2D9CD; display: flex; overflow-x: auto; padding: 0 16px; }
        .nav-btn { padding: 12px 14px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; color: #7A6B55; border-bottom: 3px solid transparent; white-space: nowrap; }
        .nav-btn.active { color: #5C7A4E; border-bottom: 3px solid #5C7A4E; font-weight: 700; }
        .content { padding: 20px 16px; width: 100%; max-width: 900px; margin: 0 auto; box-sizing: border-box; }
        .card { background: #FFFFFF; border-radius: 10px; border: 1px solid #E2D9CD; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .btn-p { background: #5C7A4E; color: #fff; border: none; border-radius: 7px; padding: 9px 18px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; }
        .btn-s { background: #E2D9CD; color: #2C2416; border: none; border-radius: 7px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 13px; }
        .btn-d { background: #C0392B; color: #fff; border: none; border-radius: 7px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 13px; }
        .input { width: 100%; padding: 9px 12px; border: 1px solid #E2D9CD; border-radius: 7px; font-family: inherit; font-size: 14px; background: #F7F3EE; color: #2C2416; box-sizing: border-box; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #7A6B55; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .th { text-align: left; padding: 10px 12px; background: #F7F3EE; border-bottom: 2px solid #E2D9CD; font-size: 12px; font-weight: 700; color: #7A6B55; text-transform: uppercase; }
        .td { padding: 10px 12px; border-bottom: 1px solid #E2D9CD; vertical-align: middle; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; max-height: "90vh"; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .sayac { border-radius: 12px; padding: 16px 20px; text-align: center; min-width: 80px; }
        @media(max-width: 600px) { .g2, .g3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span style="font-size: 24px;">🚜</span>
            <h1 style="margin: 0; font-size: 20px; font-weight: 700;">Çiftlik Yönetimi</h1>
            <button class="btn-s" style="margin-left: auto; background: rgba(255,255,255,0.2); color: #fff;" onclick="disariAktar()">📥 Dışarı Aktar</button>
        </div>

        <div class="nav">
            <button id="tab-ozet" class="nav-btn active" onclick="switchTab('ozet')">📊 Özet</button>
            <button id="tab-hayvanlar" class="nav-btn" onclick="switchTab('hayvanlar')">🐑 Hayvanlar</button>
            <button id="tab-finans" class="nav-btn" onclick="switchTab('finans')">💰 Muhasebe</button>
        </div>

        <div id="main-content" class="content"></div>
    </div>

    <div id="custom-modal" class="modal" style="display: none;">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modal-title" style="margin: 0;"></h3>
                <button onclick="closeModal()" style="background: none; border: none; font-size: 22px; cursor: pointer; color: #7A6B55;">×</button>
            </div>
            <div id="modal-body"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                <button onclick="closeModal()" class="btn-s">İptal</button>
                <button id="modal-save-btn" class="btn-p">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'ozet';
        let hayvanlar = [];
        let agirlikGecmisi = [];
        let islemler = [];
        
        // LocalStorage İşlemleri
        const loadData = (key) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch { return []; } };
        const saveData = (key, data) => { try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { console.error(e); } };

        function init() {
            hayvanlar = loadData("koyun_hayvanlar");
            agirlikGecmisi = loadData("koyun_agirlik");
            islemler = loadData("koyun_islemler");
            render();
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            render();
        }

        function render() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if (currentTab === 'ozet') {
                renderOzet(container);
            } else if (currentTab === 'hayvanlar') {
                renderHayvanlar(container);
            } else if (currentTab === 'finans') {
                renderFinans(container);
            }
        }

        function renderOzet(c) {
            let gelir = islemler.filter(i=>i.tip==="Gelir").reduce((t,i)=>t+Number(i.tutar),0);
            let gider = islemler.filter(i=>i.tip==="Gider").reduce((t,i)=>t+Number(i.tutar),0);
            
            c.innerHTML = `
                <div class="card" style="background: linear-gradient(135deg, #5C7A4E 0%, #3d5c32 100%); color: #fff;">
                    <div style="font-size: 15px; font-weight: 700; margin-bottom: 12px; opacity: 0.9;">🌿 Çiftlik Yönetimi</div>
                    <div class="g3">
                        <div style="text-align: center; padding: 12px;">
                            <div style="font-size: 26px; font-weight: 700; margin: 4px 0;">${hayvanlar.length}</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.75);">Toplam Hayvan</div>
                        </div>
                        <div style="text-align: center; padding: 12px;">
                            <div style="font-size: 26px; font-weight: 700; color: #A8D5A2; margin: 4px 0;">${gelir.toLocaleString('tr-TR')} ₺</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.75);">Toplam Gelir</div>
                        </div>
                        <div style="text-align: center; padding: 12px;">
                            <div style="font-size: 26px; font-weight: 700; color: #FFAA80; margin: 4px 0;">${gider.toLocaleString('tr-TR')} ₺</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.75);">Toplam Gider</div>
                        </div>
                    </div>
                </div>

                <div class="g2">
                    <div class="card">
                        <div style="font-size: 13px; font-weight: 700; color: #7A6B55; margin-bottom: 12px; text-transform: uppercase;">Sürü Dağılımı</div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span>🐑 Dişi</span><strong>${hayvanlar.filter(h=>h.cinsiyet==="Dişi").length}</strong>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span>🐏 Erkek</span><strong>${hayvanlar.filter(h=>h.cinsiyet==="Erkek").length}</strong>
                        </div>
                    </div>
                    <div class="card">
                        <div style="font-size: 13px; font-weight: 700; color: #7A6B55; margin-bottom: 12px; text-transform: uppercase;">Genel Sağlık</div>
                        <div style="font-size: 14px; color: #7A6B55;">Sürü aktif durumda takip ediliyor. Sağlık kayıtları stabil.</div>
                    </div>
                </div>
            `;
        }

        function renderHayvanlar(c) {
            let tableRows = hayvanlar.map((h, index) => {
                let agGecmis = agirlikGecmisi.filter(a => a.kupeNo === h.kupeNo).sort((a,b) => b.tarih.localeCompare(a.tarih));
                let sonAg = agGecmis[0] ? `${agGecmis[0].agirlik} kg` : (h.agirlik ? `${h.agirlik} kg` : "-");
                
                return `
                    <tr>
                        <td class="td"><strong>${h.kupeNo}</strong></td>
                        <td class="td">${h.isim || "-"}</td>
                        <td class="td">${h.cins || "-"}</td>
                        <td class="td">${h.yas ? h.yas + ' yaş' : "-"}</td>
                        <td class="td"><span class="badge" style="background: ${h.cinsiyet === 'Dişi' ? '#5C7A4E22':'#C8713722'}; color: ${h.cinsiyet === 'Dişi' ? '#5C7A4E':'#C87137'}">${h.cinsiyet}</span></td>
                        <td class="td">${sonAg}</td>
                        <td class="td">
                            <div style="display: flex; gap: 4px;">
                                <button class="btn-s" style="font-size: 12px; padding: 5px 10px;" onclick="openAgirlikModal('${h.kupeNo}')">⚖️</button>
                                <button class="btn-d" style="font-size: 12px; padding: 5px 10px;" onclick="silHayvan(${index})">🗑</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            c.innerHTML = `
                <div class="card">
                    <div class="row">
                        <h2 style="margin: 0; font-size: 18px;">🐑 Hayvan Kayıtları</h2>
                        <button class="btn-p" onclick="openHayvanModal()">+ Hayvan Ekle</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="th">Küpe No</th>
                                    <th class="th">İsim</th>
                                    <th class="th">Cins</th>
                                    <th class="th">Yaş</th>
                                    <th class="th">Cinsiyet</th>
                                    <th class="th">Ağırlık</th>
                                    <th class="th"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows || '<tr><td colspan="7" style="text-align:center; padding:32px; color:#7A6B55;">Kayıt bulunamadı.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderFinans(c) {
            c.innerHTML = `
                <div class="card">
                    <h2 style="margin: 0; font-size: 18px; margin-bottom: 8px;">💰 Gelir / Gider İşlemleri</h2>
                    <p style="color: #7A6B55; font-size: 14px;">Muhasebe modülü alt yapısı hazırlandı. Özet sekmesinden finansal çıktıları izleyebilirsiniz.</p>
                </div>
            `;
        }

        // Modal Fonksiyonları
        function openHayvanModal() {
            document.getElementById('modal-title').innerText = "Yeni Hayvan Ekle";
            document.getElementById('modal-body').innerHTML = `
                <div class="g2">
                    <div style="margin-bottom:12px;"><label class="label">Küpe No *</label><input id="f-kupe" class="input"></div>
                    <div style="margin-bottom:12px;"><label class="label">İsim</label><input id="f-isim" class="input"></div>
                </div>
                <div class="g2">
                    <div style="margin-bottom:12px;"><label class="label">Cins</label><input id="f-cins" class="input"></div>
                    <div style="margin-bottom:12px;"><label class="label">Yaş</label><input id="f-yas" type="number" class="input"></div>
                </div>
                <div class="g2">
                    <div style="margin-bottom:12px;"><label class="label">Cinsiyet</label>
                        <select id="f-cinsiyet" class="input"><option value="Dişi">Dişi</option><option value="Erkek">Erkek</option></select>
                    </div>
                    <div style="margin-bottom:12px;"><label class="label">Ağırlık (kg)</label><input id="f-agirlik" type="number" class="input"></div>
                </div>
            `;
            document.getElementById('modal-save-btn').onclick = kaydetHayvan;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function openAgirlikModal(kupeNo) {
            document.getElementById('modal-title').innerText = `${kupeNo} - Ağırlık Takibi`;
            document.getElementById('modal-body').innerHTML = `
                <div style="margin-bottom:12px;"><label class="label">Tarih</label><input id="f-ag-tarih" type="date" class="input" value="${new Date().toISOString().split('T')[0]}"></div>
                <div style="margin-bottom:12px;"><label class="label">Yeni Ağırlık (kg)</label><input id="f-ag-kilo" type="number" class="input"></div>
            `;
            document.getElementById('modal-save-btn').onclick = () => kaydetAgirlik(kupeNo);
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

        function kaydetHayvan() {
            let kupe = document.getElementById('f-kupe').value;
            if (!kupe) return alert("Küpe No zorunludur.");
            
            hayvanlar.push({
                kupeNo: kupe,
                isim: document.getElementById('f-isim').value,
                cins: document.getElementById('f-cins').value,
                yas: document.getElementById('f-yas').value,
                cinsiyet: document.getElementById('f-cinsiyet').value,
                agirlik: document.getElementById('f-agirlik').value,
                id: Date.now()
            });
            saveData("koyun_hayvanlar", hayvanlar);
            closeModal();
            render();
        }

        function kaydetAgirlik(kupeNo) {
            let kilo = document.getElementById('f-ag-kilo').value;
            if (!kilo) return alert("Ağırlık giriniz.");

            agirlikGecmisi.push({
                kupeNo: kupeNo,
                tarih: document.getElementById('f-ag-tarih').value,
                agirlik: kilo,
                id: Date.now()
            });
            saveData("koyun_agirlik", agirlikGecmisi);
            closeModal();
            render();
        }

        function silHayvan(index) {
            if (!confirm("Bu hayvanı silmek istediğinize emin misiniz?")) return;
            hayvanlar.splice(index, 1);
            saveData("koyun_hayvanlar", hayvanlar);
            render();
        }

        function disariAktar() {
            let rows = [["=== HAYVAN KAYITLARI ==="], ["Küpe No", "İsim", "Cins", "Yaş", "Cinsiyet", "Ağırlık"]];
            hayvanlar.forEach(h => rows.push([h.kupeNo, h.isim, h.cins, h.yas, h.cinsiyet, h.agirlik]));
            let csv = rows.map(r => r.map(c => `"${c ?? ''}"`).join(",")).join("\n");
            let blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url; a.download = "ciftlik-verileri.csv"; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
