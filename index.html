<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiftlik Yönetimi</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin:0; padding:0; background:#F7F3EE; color:#2C2416; font-family:'Georgia',serif; }
        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #8FAF7E; border-radius: 2px; }
        input, select, textarea { box-sizing: border-box !important; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const APP_ADI = "Çiftlik Yönetimi";

        const STORAGE_KEYS = {
          hayvanlar: "koyun_hayvanlar",
          islemler: "koyun_islemler",
          rasyonlar: "koyun_rasyonlar",
          saglik: "koyun_saglik",
          dogumlar: "koyun_dogumlar",
          dollenme: "koyun_dollenme",
          agirlikGecmisi: "koyun_agirlik",
        };

        const loadData = (key) => {
          try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch { return []; }
        };
        const saveData = (key, data) => {
          try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { console.error(e); }
        };

        const bugun = () => new Date().toISOString().split("T")[0];
        const tahminiDogumHesapla = (d) => { if (!d) return ""; const dt = new Date(d); dt.setDate(dt.getDate()+150); return dt.toISOString().split("T")[0]; };
        const kalanGun = (t) => { if (!t) return null; return Math.ceil((new Date(t).setHours(0,0,0,0) - new Date().setHours(0,0,0,0))/(1000*60*60*24)); };

        const R = {
          zemin:"#F7F3EE", kart:"#FFFFFF", birincil:"#5C7A4E", ikincil:"#8FAF7E",
          vurgu:"#C87137", metin:"#2C2416", metinAcik:"#7A6B55", sinir:"#E2D9CD",
          tehlike:"#C0392B", uyari:"#E67E22", formZemin:"#FAF8F5"
        };

        const S = {
          app:{minHeight:"100vh",background:R.zemin,fontFamily:"'Georgia',serif",color:R.metin},
          header:{background:R.birincil,color:"#fff",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"},
          nav:{background:"#fff",borderBottom:`1px solid ${R.sinir}`,display:"flex",overflowX:"auto",padding:"0 16px"},
          navBtn:(a)=>({padding:"14px 16px",border:"none",background:"none",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:a?"700":"400",color:a?R.birincil:R.metinAcik,borderBottom:a?`3px solid ${R.birincil}`:"3px solid transparent",whiteSpace:"nowrap"}),
          content:{padding:"20px 16px",maxWidth:900,margin:"0 auto"},
          card:{background:R.kart,borderRadius:10,border:`1px solid ${R.sinir}`,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"},
          row:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16},
          h2:{margin:0,fontSize:18},
          btnP:{background:R.birincil,color:"#fff",border:"none",borderRadius:7,padding:"10px 18px",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:"600"},
          btnS:{background:"#E2D9CD",color:R.metin,border:"none",borderRadius:7,padding:"10px 18px",cursor:"pointer",fontFamily:"inherit",fontSize:14},
          btnD:{background:R.tehlike,color:"#fff",border:"none",borderRadius:7,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13},
          input:{width:"100%",padding:"12px 14px",border:`1px solid ${R.sinir}`,borderRadius:8,fontFamily:"inherit",fontSize:14,background:R.formZemin,color:R.metin,outline:"none"},
          label:{display:"block",fontSize:12,fontWeight:"700",color:R.metinAcik,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5},
          g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14},
          g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14},
          table:{width:"100%",borderCollapse:"collapse",fontSize:14},
          th:{textAlign:"left",padding:"10px 12px",background:R.zemin,borderBottom:`2px solid ${R.sinir}`,fontSize:12,fontWeight:"700",color:R.metinAcik,textTransform:"uppercase",letterSpacing:0.4},
          td:{padding:"10px 12px",borderBottom:`1px solid ${R.sinir}`,verticalAlign:"middle"},
          badge:(c)=>({display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:"600",background:c+"22",color:c}),
          modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16},
          modalBox:{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 10px 30px rgba(0,0,0,0.2)"},
        };

        function F({label, children, required}) {
          return (
            <div style={{width:"100%"}}>
              <label style={S.label}>{label} {required && "*"}</label>
              {children}
            </div>
          );
        }

        function Modal({title, onClose, onSave, children}) {
          return(
            <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
              <div style={S.modalBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h3 style={{margin:0, fontSize:18, fontWeight:"700"}}>{title}</h3>
                  <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:R.metinAcik}}>×</button>
                </div>
                {children}
                <div style={{display:"flex",gap:10,marginTop:24,justifyContent:"flex-end"}}>
                  <button onClick={onClose} style={S.btnS}>İptal</button>
                  <button onClick={onSave} style={S.btnP}>Kaydet</button>
                </div>
              </div>
            </div>
          );
        }

        function GunSayaci({tarih,etiket}){
          const gun=kalanGun(tarih);
          if(gun===null) return null;
          const c=gun<0?R.tehlike:gun<=7?R.tehlike:gun<=30?R.uyari:R.birincil;
          const txt=gun<0?`${Math.abs(gun)} GÜN GEÇTİ`:gun===0?"BUGÜN!":gun===1?"YARIN":"";
          return(
            <div style={{background:c,borderRadius:12,padding:"12px 16px",textAlign:"center",minWidth:75}}>
              {gun>1?<div style={{fontSize:36,fontWeight:"900",color:"#fff",lineHeight:1}}>{gun}</div>:<div style={{fontSize:20,fontWeight:"900",color:"#fff",lineHeight:1}}>{txt}</div>}
              {gun>1&&<div style={{fontSize:11,color:"rgba(255,255,255,0.9)",fontWeight:"700"}}>GÜN</div>}
              <div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>{etiket}</div>
            </div>
          );
        }

        function KalanBadge({tarih}){
          const gun=kalanGun(tarih);
          if(gun===null) return <span style={{color:R.metinAcik}}>-</span>;
          const c=gun<0?R.tehlike:gun<=7?R.tehlike:gun<=30?R.uyari:R.birincil;
          const txt=gun<0?`${Math.abs(gun)} gün geçti`:gun===0?"Bugün!":gun===1?"Yarın":`${gun} gün kaldı`;
          return <span style={S.badge(c)}>{txt}</span>;
        }

        function exportExcel(hayvanlar,islemler,saglik,dogumlar,dollenme,rasyonlar){
          const rows=[];
          rows.push(["=== HAYVAN KAYITLARI ==="]);
          rows.push(["Küpe No","İsim","Cins","Yaş","Cinsiyet","Ağırlık"]);
          hayvanlar.forEach(h=>rows.push([h.kupeNo,h.isim,h.cins,h.yas,h.cinsiyet,h.agirlik]));
          rows.push([]);
          rows.push(["=== GELİR/GİDER ==="]);
          rows.push(["Tarih","Tip","Kategori","Tutar","Açıklama"]);
          islemler.forEach(i=>rows.push([i.tarih,i.tip,i.kategori,i.tutar,i.aciklama]));
          const csv=rows.map(r=>r.map(c=>`"${c??""}"`).join(",")).join("\n");
          const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a"); a.href=url; a.download="ciftlik.csv"; a.click();
        }

        function Ozet({hayvanlar,islemler,dogumlar,dollenme,rasyonlar,saglik}){
          const gelir=islemler.filter(i=>i.tip==="Gelir").reduce((t,i)=>t+Number(i.tutar),0);
          const gider=islemler.filter(i=>i.tip==="Gider").reduce((t,i)=>t+Number(i.tutar),0);
          const buAy=new Date().toISOString().slice(0,7);

          const aylar=[];
          for(let i=5;i>=0;i--){
            const d=new Date(); d.setMonth(d.getMonth()-i);
            const key=d.toISOString().slice(0,7);
            const ad=d.toLocaleString("tr-TR",{month:"short"});
            const g=islemler.filter(x=>x.tip==="Gelir"&&x.tarih?.startsWith(key)).reduce((t,x)=>t+Number(x.tutar),0);
            const gi=islemler.filter(x=>x.tip==="Gider"&&x.tarih?.startsWith(key)).reduce((t,x)=>t+Number(x.tutar),0);
            aylar.push({ad,g,gi});
          }
          const maxVal=Math.max(...aylar.map(a=>Math.max(a.g,a.gi)),1);

          const yakDogum=dollenme.filter(d=>d.tahminiDogum).map(d=>({...d,kalan:kalanGun(d.tahminiDogum)})).filter(d=>d.kalan!==null&&d.kalan>=0&&d.kalan<=30).sort((a,b)=>a.kalan-b.kalan);
          const yakRasyon=rasyonlar.filter(r=>r.sonrakiDegisim).map(r=>({...r,kalan:kalanGun(r.sonrakiDegisim)})).filter(r=>r.kalan!==null&&r.kalan>=0&&r.kalan<=14).sort((a,b)=>a.kalan-b.kalan);
          const yakAsi=saglik.filter(s=>s.tekrarTarihi).map(s=>({...s,kalan:kalanGun(s.tekrarTarihi)})).filter(s=>s.kalan!==null&&s.kalan>=0&&s.kalan<=14).sort((a,b)=>a.kalan-b.kalan);

          return(
            <div>
              <div style={{...S.card,background:`linear-gradient(135deg,${R.birincil} 0%,#3d5c32 100%)`,color:"#fff"}}>
                <div style={{fontSize:15,fontWeight:"700",marginBottom:12,opacity:0.9}}>🌿 {APP_ADI}</div>
                <div style={S.g3}>
                  {[{s:hayvanlar.length,l:"Toplam Hayvan",c:"#fff"},{s:gelir.toLocaleString("tr-TR")+" ₺",l:"Toplam Gelir",c:"#A8D5A2"},{s:gider.toLocaleString("tr-TR")+" ₺",l:"Toplam Gider",c:"#FFAA80"}].map((x,i)=>(
                    <div key={i} style={{textAlign:"center",padding:12}}>
                      <div style={{fontSize:24,fontWeight:"700",color:x.c,margin:"4px 0"}}>{x.s}</div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.75)"}}>{x.l}</div>
                    </div>
                  ))}
                </div>
              </div>

              {yakDogum.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>🐣 Yaklaşan Doğumlar</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakDogum.map((d,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={d.tahminiDogum} etiket="DOĞUMA KALAN"/>
                        <div><div style={{fontWeight:"700",fontSize:15}}>{d.kupeNo}</div><div style={{fontSize:12,color:R.metinAcik}}>{d.tahminiDogum}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {yakAsi.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>💉 Yaklaşan Aşı Tekrarları</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakAsi.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={s.tekrarTarihi} etiket="TEKRARA KALAN"/>
                        <div>
                          <div style={{fontWeight:"700",fontSize:15}}>{s.kupeNo}</div>
                          <div style={{fontSize:13,color:R.metinAcik}}>{s.tip}</div>
                          <div style={{fontSize:12,color:R.metinAcik}}>{s.tekrarTarihi}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {yakRasyon.length>0&&(
                <div style={S.card}>
                  <div style={{fontWeight:"700",marginBottom:14,fontSize:15}}>🌾 Rasyon Değişim Hatırlatması</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {yakRasyon.map((r,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:R.zemin,borderRadius:10,padding:"12px 16px",flex:1,minWidth:180}}>
                        <GunSayaci tarih={r.sonrakiDegisim} etiket="DEĞİŞİME KALAN"/>
                        <div><div style={{fontWeight:"700",fontSize:15}}>{r.isim}</div><div style={{fontSize:12,color:R.metinAcik}}>{r.hayvanGrubu}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={S.card}>
                <div style={{fontWeight:"700",marginBottom:16,fontSize:15}}>📊 Son 6 Ay Gelir/Gider</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:120}}>
                  {aylar.map((a,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:90}}>
                        <div style={{flex:1,background:R.birincil,borderRadius:"3px 3px 0 0",height:`${(a.g/maxVal)*90}px`,minHeight:a.g>0?3:0}}/>
                        <div style={{flex:1,background:R.vurgu,borderRadius:"3px 3px 0 0",height:`${(a.gi/maxVal)*90}px`,minHeight:a.gi>0?3:0}}/>
                      </div>
                      <div style={{fontSize:11,color:R.metinAcik}}>{a.ad}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        function HayvanKayitlari({hayvanlar,setHayvanlar,agirlikGecmisi,setAgirlikGecmisi}){
          const bos={kupeNo:"",isim:"",cins:"",yas:"",cinsiyet:"Dişi",agirlik:"",notlar:""};
          const [modal,setModal]=useState(false);
          const [modalAg,setModalAg]=useState(false);
          const [secili,setSecili]=useState(null);
          const [form,setForm]=useState(bos);
          const [duzenle,setDuzenle]=useState(null);
          const [arama,setArama]=useState("");
          const [formAg,setFormAg]=useState({tarih:bugun(),agirlik:""});

          const kaydet=()=>{
            if(!form.kupeNo)return alert("Küpe No zorunludur.");
            const yeni=duzenle!==null?hayvanlar.map((h,i)=>i===duzenle?form:h):[...hayvanlar,{...form,id:Date.now()}];
            setHayvanlar(yeni); saveData(STORAGE_KEYS.hayvanlar,yeni);
            setModal(false);setForm(bos);setDuzenle(null);
          };

          const sil=(i)=>{
            if(!confirm("Silmek istiyor musunuz?"))return;
            const yeni=hayvanlar.filter((_,idx)=>idx!==i);
            setHayvanlar(yeni); saveData(STORAGE_KEYS.hayvanlar,yeni);
          };

          const kaydetAg=()=>{
            if(!formAg.agirlik)return alert("Ağırlık giriniz.");
            const yeni=[...agirlikGecmisi,{...formAg,kupeNo:secili.kupeNo,id:Date.now()}];
            setAgirlikGecmisi(yeni); saveData(STORAGE_KEYS.agirlikGecmisi,yeni);
            setModalAg(false);setFormAg({tarih:bugun(),agirlik:""});
          };

          const filtreli=hayvanlar.filter(h=>h.kupeNo?.includes(arama)||h.isim?.toLowerCase().includes(arama.toLowerCase()));

          return(
            <div>
              <div style={S.card}>
                <div style={S.row}><h2 style={S.h2}>🐑 Hayvan Kayıtları</h2><button style={S.btnP} onClick={()=>{setForm(bos);setDuzenle(null);setModal(true);}}>+ Hayvan Ekle</button></div>
                <input style={{...S.input,marginBottom:16}} placeholder="Ara..." value={arama} onChange={e=>setArama(e.target.value)}/>
                {filtreli.length===0?<div style={{color:R.metinAcik,textAlign:"center",padding:32}}>Kayıt yok.</div>:(
                  <div style={{overflowX:"auto"}}>
                    <table style={S.table}>
                      <thead><tr>{["Küpe No","İsim","Cins","Yaş","Cinsiyet","Ağırlık",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                      <tbody>{filtreli.map((h,i)=>{
                        const ag=agirlikGecmisi.filter(a=>a.kupeNo===h.kupeNo).sort((a,b)=>b.tarih.localeCompare(a.tarih));
                        return(
                          <tr key={i}>
                            <td style={S.td}><strong>{h.kupeNo}</strong></td>
                            <td style={S.td}>{h.isim||"-"}</td>
                            <td style={S.td}>{h.cins||"-"}</td>
                            <td style={S.td}>{h.yas?`${h.yas} yaş`:"-"}</td>
                            <td style={S.td}><span style={S.badge(h.cinsiyet==="Dişi"?R.birincil:R.vurgu)}>{h.cinsiyet}</span></td>
                            <td style={S.td}>{ag[0]?`${ag[0].agirlik} kg`:h.agirlik?`${h.agirlik} kg`:"-"}</td>
                            <td style={S.td}><div style={{display:"flex",gap:4}}>
                              <button style={{...S.btnS,fontSize:12,padding:"5px 10px"}} onClick={()=>{setSecili(h);setModalAg(true);}}>⚖️</button>
                              <button style={{...S.btnS,fontSize:12,padding:"5px 10px"}} onClick={()=>{setForm(h);setDuzenle(hayvanlar.indexOf(h));setModal(true);}}>✏️</button>
                              <button style={{...S.btnD,fontSize:12,padding:"5px 10px"}} onClick={()=>sil(hayvanlar.indexOf(h))}>🗑</button>
                            </div></td>
                          </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                )}
              </div>
              {modal&&(<Modal title={duzenle !== null ? "Hayvanı Düzenle" : "Yeni Hayvan"} onClose={()=>{setModal(false);setDuzenle(null);}} onSave={kaydet}>
                <div style={S.g2}>
                  <F label="KÜPE NO" required><input style={S.input} value={form.kupeNo} onChange={e=>setForm({...form,kupeNo:e.target.value})}/></F>
                  <F label="İSİM"><input style={S.input} value={form.isim} onChange={e=>setForm({...form,isim:e.target.value})}/></F>
                </div>
                <div style={S.g2}>
                  <F label="CİNS"><input style={S.input} value={form.cins} onChange={e=>setForm({...form,cins:e.target.value})}/></F>
                  <F label="YAŞ"><input style={S.input} type="number" value={form.yas} onChange={e=>setForm({...form,yas:e.target.value})}/></F>
                </div>
                <div style={S.g2}>
                  <F label="CİNSİYET"><select style={S.input} value={form.cinsiyet} onChange={e=>setForm({...form,cinsiyet:e.target.value})}><option>Dişi</option><option>Erkek</option></select></F>
                  <F label="AĞIRLIK (KG)"><input style={S.input} type="number" value={form.agirlik} onChange={e=>setForm({...form,agirlik:e.target.value})}/></F>
                </div>
              </Modal>)}
              {modalAg&&secili&&(<Modal title={`⚖️ ${secili.kupeNo} Ağırlık`} onClose={()=>setModalAg(false)} onSave={kaydetAg}>
                <div style={S.g2}>
                  <F label="TARİH"><input style={S.input} type="date" value={formAg.tarih} onChange={e=>setFormAg({...formAg,tarih:e.target.value})}/></F>
                  <F label="AĞIRLIK (KG)" required><input style={S.input} type="number" value={formAg.agirlik} onChange={e=>setFormAg({...formAg,agirlik:e.target.value})}/></F>
                </div>
              </Modal>)}
            </div>
          );
        }

        function KasaIslemleri({islemler,setIslemler}){
          const bos={tarih:bugun(),tip:"Gider",kategori:"Yem",tutar:"",aciklama:""};
          const [modal,setModal]=useState(false);
          const [form,setForm]=useState(bos);

          const kaydet=()=>{
            if(!form.tutar)return alert("Tutar giriniz.");
            const yeni=[...islemler,{...form,id:Date.now()}];
            setIslemler(yeni); saveData(STORAGE_KEYS.islemler,yeni);
            setModal(false);setForm(bos);
          };

          return(
            <div style={S.card}>
              <div style={S.row}><h2 style={S.h2}>💰 Gelir / Gider</h2><button style={S.btnP} onClick={()=>setModal(true)}>+ İşlem Ekle</button></div>
              <div style={{overflowX:"auto"}}>
                <table style={S.table}>
                  <thead><tr>{["Tarih", "Tip", "Kategori", "Tutar"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                  <tbody>{islemler.map((i)=>(
                    <tr key={i.id}>
                      <td style={S.td}>{i.tarih}</td>
                      <td style={S.td}><span style={S.badge(i.tip==="Gelir"?R.birincil:R.vurgu)}>{i.tip}</span></td>
                      <td style={S.td}>{i.kategori}</td>
                      <td style={S.td}><strong>{Number(i.tutar).toLocaleString("tr-TR")} ₺</strong></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>

              {/* Son Görseldeki Birebir Form Yapısı */}
              {modal&&<Modal title="Yeni Finansal İşlem" onClose={()=>setModal(false)} onSave={kaydet}>
                <div style={{...S.g2, display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14}}>
                  <F label="TARİH">
                    <input style={S.input} type="date" value={form.tarih} onChange={e=>setForm({...form,tarih:e.target.value})}/>
                  </F>
                  <F label="İŞLEM TİPİ">
                    <select style={S.input} value={form.tip} onChange={e=>setForm({...form,tip:e.target.value})}>
                      <option>Gider</option>
                      <option>Gelir</option>
                    </select>
                  </F>
                </div>
                <div style={{...S.g2, display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14}}>
                  <F label="KATEGORİ">
                    <input style={S.input} value={form.kategori} onChange={e=>setForm({...form,kategori:e.target.value})} placeholder="Yem"/>
                  </F>
                  <F label="TUTAR (₺)">
                    <input style={S.input} type="number" value={form.tutar} onChange={e=>setForm({...form,tutar:e.target.value})}/>
                  </F>
                </div>
                <div style={{marginBottom:14}}>
                  <F label="AÇIKLAMA">
                    <input style={S.input} value={form.aciklama} onChange={e=>setForm({...form,aciklama:e.target.value})}/>
                  </F>
                </div>
              </Modal>}
            </div>
          );
        }

        function DollenmeTakibi({dollenme,setDollenme,hayvanlar}){
          const bos={kupeNo:"",dollenme:bugun(),tahminiDogum:tahminiDogumHesapla(bugun())};
          const [modal,setModal]=useState(false);
          const [form,setForm]=useState(bos);

          const tarihkur=(d)=>{setForm({...form,dollenme:d,tahminiDogum:tahminiDogumHesapla(d)});};
          const kaydet=()=>{
            if(!form.kupeNo)return alert("Küpe No seçiniz.");
            const yeni=[...dollenme,{...form,id:Date.now()}];
            setDollenme(yeni); saveData(STORAGE_KEYS.dollenme,yeni);
            setModal(false);setForm(bos);
          };

          return(
            <div>
              <div style={S.row}><h2 style={S.h2}>🔴 Döllenme Kayıtları</h2><button style={S.btnP} onClick={()=>setModal(true)}>+ Döllenme Ekle</button></div>
              <div style={{overflowX:"auto"}}>
                <table style={S.table}>
                  <thead><tr>{["Küpe No", "Tarih", "Tahmini Doğum", "Durum"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                  <tbody>{dollenme.length === 0 ? <tr><td colSpan="4" style={{textAlign:"center", padding:20, color:R.metinAcik}}>Kayıt yok.</td></tr> : dollenme.map((d)=>(
                    <tr key={d.id}>
                      <td style={S.td}><strong>{d.kupeNo}</strong></td>
                      <td style={S.td}>{d.dollenme}</td>
                      <td style={S.td}>{d.tahminiDogum}</td>
                      <td style={S.td}><KalanBadge tarih={d.tahminiDogum}/></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
              {modal&&<Modal title="Gebelik Kaydı" onClose={()=>setModal(false)} onSave={kaydet}>
                <div style={S.g2}>
                  <F label="HAYVAN (DİŞİ)" required><select style={S.input} value={form.kupeNo} onChange={e=>setForm({...form,kupeNo:e.target.value})}><option value="">Seçiniz...</option>{hayvanlar.filter(h=>h.cinsiyet==="Dişi").map(h=><option key={h.kupeNo} value={h.kupeNo}>{h.kupeNo}</option>)}</select></F>
                  <F label="DÖLLENME TARİHİ"><input style={S.input} type="date" value={form.dollenme} onChange={e=>tarihkur(e.target.value)}/></F>
                </div>
                <div style={S.g2}>
                  <F label="TAHMİNİ DOĞUM"><input style={S.input} type="date" value={form.tahminiDogum} readOnly/></F>
                </div>
              </Modal>}
            </div>
          );
        }

        function SaglikIslemleri({saglik,setSaglik,hayvanlar}){
          const bos={kupeNo:"",tarih:bugun(),tip:"Aşı",ilacAd:"",tekrarTarihi:""};
          const [modal,setModal]=useState(false);
          const [form,setForm]=useState(bos);

          const kaydet=()=>{
            if(!form.kupeNo)return alert("Küpe No seçiniz.");
            const yeni=[...saglik,{...form,id:Date.now()}];
            setSaglik(yeni); saveData(STORAGE_KEYS.saglik,yeni);
            setModal(false);setForm(bos);
          };

          return(
            <div style={S.card}>
              <div style={S.row}><h2 style={S.h2}>💉 Sağlık & Aşı Takibi</h2><button style={S.btnP} onClick={()=>setModal(true)}>+ Sağlık Kaydı</button></div>
              <table style={S.table}>
                <thead><tr>{["Küpe No", "Tarih", "Tip", "İlaç/Uygulama", "Tekrar"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                <tbody>{saglik.map((s)=>(
                  <tr key={s.id}>
                    <td style={S.td}><strong>{s.kupeNo}</strong></td>
                    <td style={S.td}>{s.tarih}</td>
                    <td style={S.td}><span style={S.badge(s.tip==="Aşı"?R.birincil:R.uyari)}>{s.tip}</span></td>
                    <td style={S.td}>{s.ilacAd}</td>
                    <td style={S.td}>{s.tekrarTarihi?<KalanBadge tarih={s.tekrarTarihi}/>:"-"}</td>
                  </tr>
                ))}</tbody>
              </table>
              {modal&&<Modal title="Yeni Sağlık Kaydı" onClose={()=>setModal(false)} onSave={kaydet}>
                <div style={S.g2}>
                  <F label="HAYVAN"><select style={S.input} value={form.kupeNo} onChange={e=>setForm({...form,kupeNo:e.target.value})}><option value="">Seçiniz...</option>{hayvanlar.map(h=><option key={h.kupeNo} value={h.kupeNo}>{h.kupeNo}</option>)}</select></F>
                  <F label="TARİH"><input style={S.input} type="date" value={form.tarih} onChange={e=>setForm({...form,tarih:e.target.value})}/></F>
                </div>
                <div style={S.g2}>
                  <F label="TÜR"><select style={S.input} value={form.tip} onChange={e=>setForm({...form,tip:e.target.value})}><option>Aşı</option><option>Tedavi</option></select></F>
                  <F label="İLAÇ ADI"><input style={S.input} value={form.ilacAd} onChange={e=>setForm({...form,ilacAd:e.target.value})}/></F>
                </div>
                <div style={S.g2}>
                  <F label="TEKRAR TARİHİ"><input style={S.input} type="date" value={form.tekrarTarihi} onChange={e=>setForm({...form,tekrarTarihi:e.target.value})}/></F>
                </div>
              </Modal>}
            </div>
          );
        }

        function DogumKayitlari({dogumlar,setDogumlar,hayvanlar}){
          const bos={kupeNo:"",tarih:bugun(),yavrular:"1",notlar:""};
          const [modal,setModal]=useState(false);
          const [form,setForm]=useState(bos);

          const kaydet=()=>{
            if(!form.kupeNo)return alert("Ana Küpe No seçiniz.");
            const yeni=[...dogumlar,{...form,id:Date.now()}];
            setDogumlar(yeni); saveData(STORAGE_KEYS.dogumlar,yeni);
            setModal(false);setForm(bos);
          };

          return(
            <div>
              <div style={S.row}><h2 style={S.h2}>🐣 Doğum Kayıtları</h2><button style={S.btnP} onClick={()=>setModal(true)}>+ Doğum Ekle</button></div>
              <table style={S.table}>
                <thead><tr>{["ANA KÜPE NO", "DOĞUM TARİHİ", "YAVRU SAYISI", "NOTLAR"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                <tbody>{dogumlar.length === 0 ? <tr><td colSpan="4" style={{textAlign:"center", padding:20, color:R.metinAcik}}>Kayıt yok.</td></tr> : dogumlar.map((d)=>(
                  <tr key={d.id}>
                    <td style={S.td}><strong>{d.kupeNo}</strong></td>
                    <td style={S.td}>{d.tarih}</td>
                    <td style={S.td}><span style={S.badge(R.birincil)}>{d.yavrular} Kuzu</span></td>
                    <td style={S.td}>{d.notlar||"-"}</td>
                  </tr>
                ))}</tbody>
              </table>
              {modal&&<Modal title="Yeni Doğum" onClose={()=>setModal(false)} onSave={kaydet}>
                <div style={S.g3}>
                  <F label="ANA KÜPE NO"><select style={S.input} value={form.kupeNo} onChange={e=>setForm({...form,kupeNo:e.target.value})}><option value="">Seçiniz...</option>{hayvanlar.filter(h=>h.cinsiyet==="Dişi").map(h=><option key={h.kupeNo} value={h.kupeNo}>{h.kupeNo}</option>)}</select></F>
                  <F label="DOĞUM TARİHİ"><input style={S.input} type="date" value={form.tarih} onChange={e=>setForm({...form,tarih:e.target.value})}/></F>
                  <F label="YAVRU SAYISI"><input style={S.input} type="number" min="1" value={form.yavrular} onChange={e=>setForm({...form,yavrular:e.target.value})}/></F>
                </div>
                <div style={{marginTop:14}}>
                  <F label="NOTLAR"><input style={S.input} value={form.notlar} onChange={e=>setForm({...form,notlar:e.target.value})}/></F>
                </div>
              </Modal>}
            </div>
          );
        }

        function RasyonYonetimi({rasyonlar,setRasyonlar}){
          const bos={isim:"",hayvanGrubu:"Tüm Sürü",siklik:"Günlük",malzemeAd:"",malzemeKg:"",baslangicTarih:bugun(),sonrakiDegisim:""};
          const [modal,setModal]=useState(false);
          const [form,setForm]=useState(bos);

          const kaydet=()=>{
            if(!form.isim) return alert("Rasyon adı zorunludur.");
            const yeni=[...rasyonlar,{...form,id:Date.now()}];
            setRasyonlar(yeni); saveData(STORAGE_KEYS.rasyonlar,yeni);
            setModal(false); setForm(bos);
          };

          return(
            <div style={S.card}>
              <div style={S.row}><h2 style={S.h2}>🌾 Rasyon & Yem Reçeteleri</h2><button style={S.btnP} onClick={()=>setModal(true)}>+ Rasyon Reçetesi</button></div>
              <div style={{overflowX:"auto"}}>
                <table style={S.table}>
                  <thead><tr>{["Rasyon Adı", "Grup", "Sıklık", "Malzeme (kg)", "Değişim"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                  <tbody>{rasyonlar.map((r)=>(
                    <tr key={r.id}>
                      <td style={S.td}><strong>{r.isim}</strong></td>
                      <td style={S.td}>{r.hayvanGrubu}</td>
                      <td style={S.td}>{r.siklik}</td>
                      <td style={S.td}>{r.malzemeAd ? `${r.malzemeAd} (${r.malzemeKg} kg)` : "-"}</td>
                      <td style={S.td}>{r.sonrakiDegisim?<KalanBadge tarih={r.sonrakiDegisim}/>:"-"}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>

              {modal&&<Modal title="Yeni Rasyon" onClose={()=>setModal(false)} onSave={kaydet}>
                <div style={{marginBottom:14}}>
                  <F label="RASYON ADI" required>
                    <input style={S.input} value={form.isim} onChange={e=>setForm({...form,isim:e.target.value})} placeholder="Günlük süt koyunu rasyonu"/>
                  </F>
                </div>
                <div style={{marginBottom:14}}>
                  <F label="HAYVAN GRUBU">
                    <select style={S.input} value={form.hayvanGrubu} onChange={e=>setForm({...form,hayvanGrubu:e.target.value})}><option>Tüm Sürü</option><option>Kuzular</option><option>Gebe Koyunlar</option><option>Süt Koyunları</option></select>
                  </F>
                </div>
                <div style={{marginBottom:14}}>
                  <F label="SIKLIK">
                    <select style={S.input} value={form.siklik} onChange={e=>setForm({...form,siklik:e.target.value})}><option>Günlük</option><option>Haftalık</option><option>Aylık</option></select>
                  </F>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                    <label style={S.label}>MALZEMELER (KG)</label>
                    <button style={{...S.btnS, padding:"4px 8px", fontSize:11, background:"#E2D9CD", border:"none", borderRadius:4, cursor:"pointer"}} type="button">+ Malzeme Ekle</button>
                  </div>
                  <div style={{display:"flex", gap:8}}>
                    <input style={{...S.input, flex:2}} value={form.malzemeAd} onChange={e=>setForm({...form,malzemeAd:e.target.value})} placeholder="Malzeme adı (kuru ot, kepek...)"/>
                    <input style={{...S.input, flex:1}} value={form.malzemeKg} onChange={e=>setForm({...form,malzemeKg:e.target.value})} placeholder="kg" type="number"/>
                  </div>
                </div>
                <div style={{...S.g2, display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14}}>
                  <F label="BAŞLANGIÇ TARİHİ"><input style={S.input} type="date" value={form.baslangicTarih} onChange={e=>setForm({...form,baslangicTarih:e.target.value})}/></F>
                  <F label="SONRAKİ DEĞİŞİM"><input style={S.input} type="date" value={form.sonrakiDegisim} onChange={e=>setForm({...form,sonrakiDegisim:e.target.value})}/></F>
                </div>
              </Modal>}
            </div>
          );
        }

        function App() {
          const [sekme, setSekme] = useState("ozet");
          const [dogumAltSekme, setDogumAltSekme] = useState("gebelik");
          const [hayvanlar, setHayvanlar] = useState([]);
          const [islemler, setIslemler] = useState([]);
          const [rasyonlar, setRasyonlar] = useState([]);
          const [saglik, setSaglik] = useState([]);
          const [dogumlar, setDogumlar] = useState([]);
          const [dollenme, setDollenme] = useState([]);
          const [agirlikGecmisi, setAgirlikGecmisi] = useState([]);

          useEffect(() => {
            setHayvanlar(loadData(STORAGE_KEYS.hayvanlar));
            setIslemler(loadData(STORAGE_KEYS.islemler));
            setRasyonlar(loadData(STORAGE_KEYS.rasyonlar));
            setSaglik(loadData(STORAGE_KEYS.saglik));
            setDogumlar(loadData(STORAGE_KEYS.dogumlar));
            setDollenme(loadData(STORAGE_KEYS.dollenme));
            setAgirlikGecmisi(loadData(STORAGE_KEYS.agirlikGecmisi));
          }, []);

          return (
            <div style={S.app}>
              <div style={S.header}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 28 }}>🐑</span>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 20, fontWeight: "700" }}>{APP_ADI}</h2>
                    <div style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>{hayvanlar.length} hayvan kayıtlı</div>
                  </div>
                </div>
                <button style={{...S.btnS, background: "rgba(255,255,255,0.2)", color: "#fff", border: "none", borderRadius:7, padding:"10px 18px", fontWeight:"600", cursor:"pointer"}} onClick={() => exportExcel(hayvanlar, islemler, saglik, dogumlar, dollenme, rasyonlar)}>🎂 Excel (CSV) Çıktısı</button>
              </div>

              <div style={S.nav}>
                {[
                  { id: "ozet", l: "🌿 Özet" },
                  { id: "hayvanlar", l: "🐑 Hayvan Kayıtları" },
                  { id: "kasa", l: "💰 Gelir/Gider" },
                  { id: "rasyon", l: "🌾 Rasyonlar" },
                  { id: "saglik", l: "💉 Sağlık & Aşı" },
                  { id: "dogum_ust", l: "🐣 Doğum" }
                ].map(t => (
                  <button key={t.id} style={S.navBtn(sekme === t.id)} onClick={() => setSekme(t.id)}>{t.l}</button>
                ))}
              </div>

              <div style={S.content}>
                {sekme === "ozet" && <Ozet hayvanlar={hayvanlar} islemler={islemler} dogumlar={dogumlar} dollenme={dollenme} rasyonlar={rasyonlar} saglik={saglik} />}
                {sekme === "hayvanlar" && <HayvanKayitlari hayvanlar={hayvanlar} setHayvanlar={setHayvanlar} agirlikGecmisi={agirlikGecmisi} setAgirlikGecmisi={setAgirlikGecmisi} />}
                {sekme === "kasa" && <KasaIslemleri islemler={islemler} setIslemler={setIslemler} />}
                {sekme === "rasyon" && <RasyonYonetimi rasyonlar={rasyonlar} setRasyonlar={setRasyonlar} />}
                {sekme === "saglik" && <SaglikIslemleri saglik={saglik} setSaglik={setSaglik} hayvanlar={hayvanlar} />}
                
                {sekme === "dogum_ust" && (
                  <div>
                    {/* Görseldeki Orijinal Yan Yana Buton Formatı */}
                    <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                      <button style={{ flex: 1, padding: "14px 16px", border: `1px solid ${R.sinir}`, borderRadius: 10, fontSize: 15, fontWeight: "700", cursor: "pointer", background: dogumAltSekme === "gebelik" ? R.birincil : "#fff", color: dogumAltSekme === "gebelik" ? "#fff" : R.metin, boxShadow: "0 2px 4px rgba(0,0,0,0.04)" }} onClick={() => setDogumAltSekme("gebelik")}>🔴 Döllenme & Gebelik</button>
                      <button style={{ flex: 1, padding: "14px 16px", border: `1px solid ${R.sinir}`, borderRadius: 10, fontSize: 15, fontWeight: "700", cursor: "pointer", background: dogumAltSekme === "dogumlar" ? R.birincil : "#fff", color: dogumAltSekme === "dogumlar" ? "#fff" : R.metin, boxShadow: "0 2px 4px rgba(0,0,0,0.04)" }} onClick={() => setDogumAltSekme("dogumlar")}>🐣 Doğum Kayıtları</button>
                    </div>
                    <div style={S.card}>
                      {dogumAltSekme === "gebelik" && <DollenmeTakibi dollenme={dollenme} setDollenme={setDollenme} hayvanlar={hayvanlar} />}
                      {dogumAltSekme === "dogumlar" && <DogumKayitlari dogumlar={dogumlar} setDogumlar={setDogumlar} hayvanlar={hayvanlar} />}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
