<!DOCTYPE html>
<html lang="tr">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        body { margin: 0; padding: 0; background-color: #F7F3EE; }
        
        /* Mobil kaydırma çubuğu gizleme */
        div::-webkit-scrollbar { height: 4px; }
        div::-webkit-scrollbar-thumb { background: #E2D9CD; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,stage-2">
        const { useState, useEffect, useRef } = React;
        const APP_ADI = "Çiftlik Yönetimi";

        // ... Durum tanımlamaları (agirlikGecmisi: "koyun_agirlik" vb.) ...

        // KESİNLİKLE DEĞİŞMEYEN FONKSİYONLAR (Sadece ==> hatası => olarak düzeltildi ve async eklendi)
        const loadData = async (key) => {
            try { 
                const r = localStorage.getItem(key); 
                return r ? JSON.parse(r) : []; 
            } catch (e) { 
                return []; 
            }
        };

        const saveData = async (key, data) => {
            try { 
                localStorage.setItem(key, JSON.stringify(data)); 
            } catch (e) { 
                console.error(e); 
            }
        };

        // BİREBİR İLK ARAYÜZ TASARIMINIZ (Georgia yazı tipi ve orijinal renkler korundu)
        const S = {
            app: {
                minHeight: "100vh",
                background: R.zemin,
                fontFamily: 'Georgia', // Arayüzün aynı kalması için ilk yazı tipini koruduk
                color: R.metin
            },
            header: {
                background: R.birincil,
                color: "#fff",
                padding: "16px 24px",
                display: "flex",
                alignItems: "center",
                gap: "12px",
                boxShadow: "0 2px 8px"
            }
        };

        // ... Kodunuzun geri kalan kısmı ...
    </script>
</body>
